<!--
    MOM-CA MOMathon Charters Page
    =============================
    Converted from: my/XRX/src/mom/app/momathon/widget/momathon-charters.widget.xml
-->
<div class="page-layout--full" data-template="momathon-charters:page">

    <div class="card">
        <div class="card-header">
            <h2>
                <span data-i18n="momathon">MOMathon</span>
                <span>: </span>
                <span data-template="momathon-charters:mode-label"></span>
            </h2>
        </div>
        <div class="card-body">
            <!-- Breadcrumb -->
            <div>
                <a data-template="app:link" href="momathon">
                    <span data-i18n="momathon">MOMathon</span>
                </a>
                <span> &gt; </span>
                <span>Charter-Overview</span>
                <span> &gt; </span>
                <a data-template="momathon-charters:fond-link"></a>
            </div>

            <!-- Goto search placeholder -->
            <div id="goto-search"></div>

            <!-- Preface / no charters message -->
            <div id="preface" data-template="momathon-charters:preface">
                <span data-i18n="charters-soon-available-message">The charters of this fond will be available soon.</span>
            </div>

            <!-- Charter previews -->
            <div class="charter-list" data-template="momathon-charters:preview-list">
                <!-- MOMathon charter previews rendered here -->
            </div>
        </div>
    </div>

</div>
