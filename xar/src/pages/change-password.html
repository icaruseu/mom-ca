<!--
    MOM-CA Change Password Page (Fore Web Components)
    ===================================================
    Conversion of the legacy change-password.widget.xml from XForms
    to Fore web components.

    Requires authentication (xrx:auth with dbgroup=atom).

    Sources:
        my/XRX/src/core/app/user/widget/change-password.widget.xml
        my/XRX/src/mom/app/user/widget/change-password.widget.xml
-->
<div class="page-layout--full" style="max-width:480px;margin:2rem auto">

    <div class="card">
        <div class="card-header">
            <h2 class="mb-0" data-i18n="change-password">Change my password</h2>
        </div>
        <div class="card-body">

            <!-- Unauthenticated state -->
            <div id="change-password-guest" class="auth-false" hidden="hidden">
                <p data-i18n="login-with-old-or-created-password-message">
                    To change your password please login with your old password first -
                    or with the automatically created one we sent you by Email.
                </p>
            </div>

            <!-- Authenticated state -->
            <div id="change-password-form" class="auth-true">

                <fx-fore>
                    <fx-model id="change-password">

                        <fx-instance id="passwords">
                            <data>
                                <oldpassword></oldpassword>
                                <oldpassword-repeat></oldpassword-repeat>
                                <newpassword></newpassword>
                                <newpassword-repeat></newpassword-repeat>
                            </data>
                        </fx-instance>

                        <fx-instance id="iresponse">
                            <data>
                                <status></status>
                                <message></message>
                                <icon></icon>
                            </data>
                        </fx-instance>

                        <fx-bind ref="oldpassword" required="true()" constraint="string-length(.) >= 6"></fx-bind>
                        <fx-bind ref="oldpassword-repeat" required="true()" constraint=". = ../oldpassword"></fx-bind>
                        <fx-bind ref="newpassword" required="true()" constraint="string-length(.) >= 6"></fx-bind>
                        <fx-bind ref="newpassword-repeat" required="true()" constraint=". = ../newpassword"></fx-bind>

                        <fx-submission id="schange-password"
                                       url="/api/user/change-password"
                                       method="POST"
                                       replace="instance"
                                       instance="iresponse">
                        </fx-submission>

                    </fx-model>

                    <!-- Response messages -->
                    <div id="dresponse-info-div">
                        <div>
                            <fx-output ref="instance('iresponse')/icon" media-type="image/*"></fx-output>
                        </div>
                        <div>
                            <fx-output ref="instance('iresponse')/message"></fx-output>
                        </div>
                    </div>

                    <div class="form-group">
                        <fx-control ref="oldpassword">
                            <label slot="label">
                                <span data-i18n="actual-password">Current password</span>
                            </label>
                            <input type="password"
                                   placeholder="Enter your current password"
                                   data-i18n-placeholder="enter-actual-password-message"
                                   autocomplete="current-password"/>
                            <fx-alert data-i18n="must-be-6-characters">Must be at least 6 characters.</fx-alert>
                        </fx-control>
                    </div>

                    <div class="form-group">
                        <fx-control ref="oldpassword-repeat">
                            <label slot="label">
                                <span data-i18n="repeat">Repeat</span>
                            </label>
                            <input type="password"
                                   placeholder="Repeat Password"
                                   data-i18n-placeholder="repeat-password"
                                   autocomplete="current-password"/>
                            <fx-alert data-i18n="password-does-not-match">Password does not match.</fx-alert>
                        </fx-control>
                    </div>

                    <div class="form-group">
                        <fx-control ref="newpassword">
                            <label slot="label">
                                <span data-i18n="new-password">New Password</span>
                            </label>
                            <input type="password"
                                   placeholder="Enter the new Password"
                                   data-i18n-placeholder="enter-new-password"
                                   autocomplete="new-password"/>
                            <fx-alert data-i18n="must-be-6-characters">Must be at least 6 characters.</fx-alert>
                        </fx-control>
                    </div>

                    <div class="form-group">
                        <fx-control ref="newpassword-repeat">
                            <label slot="label">
                                <span data-i18n="repeat">Repeat</span>
                            </label>
                            <input type="password"
                                   placeholder="Repeat Password"
                                   data-i18n-placeholder="repeat-password"
                                   autocomplete="new-password"/>
                            <fx-alert data-i18n="password-does-not-match">Password does not match.</fx-alert>
                        </fx-control>
                    </div>

                    <div class="form-group">
                        <fx-trigger>
                            <button class="btn btn--primary" data-i18n="apply-changes">Apply Changes</button>
                            <fx-send submission="schange-password" event="click"></fx-send>
                        </fx-trigger>
                    </div>

                </fx-fore>

            </div>

        </div>
    </div>

</div>

<script type="module">
    // Toggle authenticated / unauthenticated views
    const isGuest = document.documentElement.dataset.user === 'guest';
    if (isGuest) {
        document.getElementById('change-password-form').hidden = true;
        document.getElementById('change-password-guest').hidden = false;
    }
</script>
