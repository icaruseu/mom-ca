<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="charter-versions">Charter Versions</title>
  </head>
  <body>
    <div data-template="publication:patch-charter-view">
      <a data-template="publication:back-link">
        <span>&lt;&lt; </span>
        <span data-i18n="back">back</span>
      </a>

      <div class="card">
        <div class="card-body">
          <div data-template="publication:patch-result">
            <!-- Success message -->
            <div data-template="publication:patch-success">
              <span data-i18n="patching-done">Success! The former state of these Document was successfully restored!</span>
            </div>
            <!-- Error message -->
            <div data-template="publication:patch-error">
              <span data-i18n="patching-error">Error! The former state of these Document could not be restored!</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
