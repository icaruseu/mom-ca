<div class="page-layout--full">

  <h1>
    <span data-i18n="charters_on_map">Charters on map</span>:
  </h1>

  <!-- Sub-headline with breadcrumb, rendered based on type (archive/fond/collection) -->
  <div id="subheadline" data-template="charters-on-map:sub-headline"/>

  <!-- Geo map widget -->
  <div id="geomap_widget" data-template="charters-on-map:geomap"/>

  <!-- Results (shown when place is selected) -->
  <div id="results" data-template="charters-on-map:results">
    <h2 data-template="charters-on-map:place-name"/>
    <div id="searchinformations"></div>
    <div id="resultpages" data-template="charters-on-map:page-list"/>
    <!-- Charter preview items rendered by template -->
    <div class="charter-list" data-template="charters-on-map:charter-preview-items"/>
  </div>

</div>
