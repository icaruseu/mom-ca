<div class="card">
  <div class="card-header">
    <a href="javascript:showHideDiv_neu('howToCite', '')">
      <span data-i18n="how-to-cite">How to cite</span>
    </a>
  </div>
  <div class="card-body" id="howToCite" style="display:none">
    <p>
      <span data-template="how-to-cite:citation"
            data-template-archive="$wcharter:archive"
            data-template-fond="$wcharter:fond"
            data-template-idno="$wcharter:idno"
            data-template-volltext-bibl="$wcharter:volltext-bibl"
            data-template-default-url="$wcharter:default-url">
        <!-- Citation text rendered server-side:
             {archive}, {fond} {idno},
             {description/edition based on: bibl...}
             in: Monasterium.net, URL <https://www.monasterium.net{default-url}/charter>, accessed {current-date}
        -->
      </span>
    </p>
  </div>
</div>
