<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="search">Search</title>
  </head>
  <body>
    <div class="page-layout--full" data-template="search:view">

      <!-- Search form (shown when no results) -->
      <form id="search-form" method="get" name="search-form" data-template="search:form-visibility">
        <div class="card">
          <div class="card-header">
            <h1 data-i18n="search">Search</h1>
          </div>
          <div class="card-body">
            <div data-template="search:no-result-message">
              <span data-i18n="no-results-message">No results were found for your search.</span>
            </div>

            <div class="form-group">
              <input id="search-field" name="q" type="text" data-template="search:query-value"/>
              <input id="search-trigger" class="btn btn--primary" type="submit" data-i18n="search" value="Search"/>
            </div>

            <!-- Search options -->
            <div class="form-group">
              <input checked="checked" name="option" type="radio" value="and"/>
              <span data-i18n="conjunction">conjunction</span>
              <input name="option" type="radio" value="or"/>
              <span data-i18n="disjunction">disjunction</span>
              <input name="option" type="radio" value="phrase"/>
              <span data-i18n="phrase">phrase</span>
              <div hidden="hidden">
                <input id="search-only-image" name="img" type="hidden"/>
                <input id="search-only-annotations" name="annotations" type="hidden"/>
                <input id="search-sort-date" name="sort" type="radio" value="date"/>
                <input id="search-sort-ranking" name="sort" type="radio" value="ranking"/>
              </div>
            </div>

            <!-- Search hints -->
            <div class="text-muted text-small">
              <p data-i18n="search-hints">Hints on search syntax</p>
              <p data-i18n="search2-hints-details">You can use the asterisk (*) as a wildcard...</p>
            </div>

            <input id="categories-search" name="categories" type="hidden" value=""/>
            <input id="context-search" name="context" type="hidden" value=""/>
          </div>
        </div>
      </form>

      <!-- Results area (shown when results exist) -->
      <div data-template="search:result-area">
        <div>
          <a href="search">
            <span>&lt;&lt; </span>
            <span data-i18n="back">back</span>
          </a>
        </div>

        <h1>
          <span data-i18n="results">Results</span>
          <span>, </span>
          <span data-i18n="page">Page</span>
          <span data-template="search:block-number"/>
        </h1>

        <p class="text-muted">
          <span data-i18n="hits">Hits</span>
          <b data-template="search:start"/>
          <span data-i18n="to">to</span>
          <b data-template="search:stop"/>
          <span data-i18n="of">of</span>
          <b data-template="search:count-filtered"/>
          <b class="text-muted" data-template="search:count-total"/>
        </p>

        <!-- Block navigation -->
        <div data-template="search:block-navigation"/>
        <div data-template="search:query-display"/>

        <div class="page-layout">
          <main>
            <!-- Charter results -->
            <div class="charter-list" data-template="search:charter-results"/>

            <!-- Bottom block navigation -->
            <div data-template="search:block-navigation"/>
          </main>

          <!-- Filter sidebar -->
          <aside class="sidebar">
            <div class="card">
              <div class="card-header">
                <h3 data-i18n="sort">sort</h3>
              </div>
              <div class="card-body">
                <div class="form-group">
                  <input id="result-sort-date" name="sort" type="radio" value="date"/>
                  <span data-i18n="by-date">by date</span>
                </div>
                <div class="form-group">
                  <input id="result-sort-ranking" name="sort" type="radio" value="ranking"/>
                  <span data-i18n="by-ranking">by ranking</span>
                </div>
              </div>
            </div>
            <div class="card">
              <div class="card-body">
                <!-- Context / category filters -->
                <div data-template="search:context-filter"/>
                <div data-template="search:category-filter"/>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </div>
  </body>
</html>
