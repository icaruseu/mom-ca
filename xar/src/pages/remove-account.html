<!--
    MOM-CA Remove Account Page (Fore Web Components)
    ==================================================
    Conversion of the legacy remove-account.widget.xml from XForms
    to Fore web components.

    Requires authentication (xrx:auth with dbgroup=atom).

    Sources:
        my/XRX/src/core/app/user/widget/remove-account.widget.xml
        my/XRX/src/mom/app/user/widget/remove-account.widget.xml
-->
<div class="page-layout--full" style="max-width:480px;margin:2rem auto">

    <!-- Unauthenticated state -->
    <div id="remove-account-guest" class="auth-false" hidden="hidden">
        <div class="card">
            <div class="card-body">
                <p data-i18n="protected-page-message">
                    Protected page. Please login first.
                </p>
            </div>
        </div>
    </div>

    <!-- Authenticated state -->
    <div id="dremove-account" class="auth-true">

        <div class="card" style="border-left:4px solid var(--color-accent)">
            <div class="card-header">
                <h2 class="mb-0" data-i18n="remove-account">Remove Account</h2>
            </div>
            <div class="card-body">

                <p data-i18n="remove-this-account-question">
                    Do you really want to remove this Account?
                </p>

                <fx-fore>
                    <fx-model id="mremove-account">

                        <fx-instance id="iremove-account">
                            <data>
                                <userid data-template="user:current-id"></userid>
                                <password></password>
                                <repeatpassword></repeatpassword>
                            </data>
                        </fx-instance>

                        <fx-instance id="iresponse">
                            <data>
                                <status></status>
                                <message></message>
                                <icon></icon>
                            </data>
                        </fx-instance>

                        <fx-bind ref="repeatpassword" required="true()" constraint=". = ../password"></fx-bind>

                        <fx-submission id="sremove-account"
                                       url="/api/user/remove-account"
                                       method="POST"
                                       replace="instance"
                                       instance="iresponse">
                        </fx-submission>

                    </fx-model>

                    <!-- Response messages -->
                    <div id="dresponse-info-div">
                        <div>
                            <fx-output ref="instance('iresponse')/icon" media-type="image/*"></fx-output>
                        </div>
                        <div>
                            <fx-output ref="instance('iresponse')/message"></fx-output>
                        </div>
                    </div>

                    <div class="form-group">
                        <fx-control ref="password">
                            <label slot="label">
                                <span data-i18n="password-twice">Password (twice)</span>
                            </label>
                            <input type="password" autocomplete="current-password"/>
                        </fx-control>
                    </div>

                    <div class="form-group">
                        <fx-control ref="repeatpassword">
                            <label slot="label">
                                <span class="sr-only">Repeat password</span>
                            </label>
                            <input type="password" autocomplete="current-password"/>
                            <fx-alert data-i18n="password-does-not-match">Password does not match.</fx-alert>
                        </fx-control>
                    </div>

                    <p style="color:var(--color-accent);font-weight:bold" data-i18n="removing-account-cant-be-undone">
                        Removing your account can not be undone
                    </p>

                    <div style="display:flex;gap:0.5rem">
                        <fx-trigger>
                            <button class="btn" data-i18n="cancel">Cancel</button>
                            <fx-action event="click">
                                <fx-load url="my-account"></fx-load>
                            </fx-action>
                        </fx-trigger>

                        <fx-trigger>
                            <button class="btn btn--primary" data-i18n="remove">Remove</button>
                            <fx-send submission="sremove-account" event="click"></fx-send>
                        </fx-trigger>
                    </div>

                </fx-fore>

            </div>
        </div>

    </div>

</div>

<script type="module">
    // Toggle authenticated / unauthenticated views
    const isGuest = document.documentElement.dataset.user === 'guest';
    if (isGuest) {
        document.getElementById('dremove-account').hidden = true;
        document.getElementById('remove-account-guest').hidden = false;
    }
</script>
