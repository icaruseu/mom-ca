<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Import Info XML</title>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h3>XML</h3>
        </div>
        <div class="card-body">
            <img src="resources/images/XML.png" alt="XML"/>
            <p class="text-muted" data-i18n="xml-import-info-1">Import any XML file containing charter descriptions into MOM-CA. To make the import work you need a XSLT script which transforms the XML document into CEI.</p>
            <div data-template="app:include" data-template-path="useful-links-xml.html"></div>
            <div data-template="app:import-info-recent" data-template-type="XML"></div>
            <a class="btn btn--primary" data-template="app:import-info-link" data-template-type="xml">
                <span data-i18n="xml-import">XML import</span> &gt;&gt;
            </a>
        </div>
    </div>
</body>
</html>
