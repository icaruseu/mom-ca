<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="saved-vocabularies">Saved Vocabularies</title>
  </head>
  <body>
    <div data-template="publication:saved-vocabularies-view">

      <div class="card">
        <div class="card-header">
          <h1 data-i18n="saved-vocabularies">Saved Vocabularies</h1>
        </div>
        <div class="card-body">
          <div data-template="publication:navigation"/>

          <div class="charter-list">
            <div data-template="publication:saved-vocabulary-list" class="charter-item">
              <div>
                <b><span data-i18n="vocabulary">Vocabulary</span><span>: </span></b>
                <span data-template="publication:vocabulary-name"/>
              </div>
              <div>
                <a data-template="publication:open-in-skos-editor-link" data-i18n="open-in-skosedit">Open Vocabulary in SKOS-Editor</a>
              </div>
              <div>
                <a data-template="publication:version-diff-link" data-i18n="version-difference">Version Difference</a>
              </div>
              <div>
                <a data-template="publication:remove-vocabulary-link" data-i18n="remove-vocabulary">Remove Vocabulary</a>
              </div>
              <div data-template="publication:bookmark-trigger"/>
            </div>
          </div>

          <div data-template="publication:navigation"/>
        </div>
      </div>
    </div>
  </body>
</html>
