<div data-template="my-collection:load">

  <nav class="breadcrumb">
    <a data-template="config:resolve-link" href="collections">
      <span data-i18n="collections">Collections</span>
    </a>
    <span class="sep">/</span>
    <a data-template="config:resolve-link" href="my-collections">
      <span data-i18n="my-collections">MyCollections</span>
    </a>
    <span class="sep">/</span>
    <a data-template="my-collection:self-link">
      <span data-template="my-collection:context-name"/>
    </a>
  </nav>

  <h1>
    <span data-i18n="my-collection-preview">My Collection (Preview)</span>
    <span>: </span>
    <span data-template="my-collection:context-name"/>
  </h1>

  <div class="page-layout">

    <main>
      <!-- Preface link -->
      <div data-template="auth:require-group" data-group="atom">
        <div data-template="my-collection:preface-link-style">
          <a class="btn" href="my-collection">
            <span data-i18n="preface">Preface</span>
          </a>
        </div>
      </div>

      <!-- Year/block navigation -->
      <div data-template="charters:year-navigation"/>

      <!-- Goto search placeholder -->
      <div id="goto-search">
        <a href=""> </a>
      </div>

      <!-- Preface -->
      <div id="preface">
        <div data-template="my-collection:preface-content"/>
      </div>

      <!-- Charter previews -->
      <div class="charter-list">
        <div data-template="my-collection:charter-preview-items"/>
        <div data-template="charters:block-navigation"/>
      </div>
    </main>

    <aside class="sidebar">
      <!-- My Functions (authenticated) -->
      <div data-template="auth:require-group" data-group="atom">
        <div class="card">
          <div class="card-header" data-i18n="my-functions">MyFunctions</div>
          <div class="card-body">
            <a class="btn" href="edit-my-collection-info">
              <span data-i18n="edit-preface">Edit Preface</span>
            </a>
            <a class="btn" data-template="my-collection:remove-href">
              <span data-i18n="remove-collections">Remove Collection</span>
            </a>
            <a class="btn" data-template="my-collection:cei-download-href" target="_blank">
              <span data-i18n="show-collection-cei-xml">Download collection as XML/CEI</span>
            </a>
            <a class="btn" data-template="config:resolve-link" href="my-collections-edit">
              <span data-i18n="edit-my-collections">Edit my Collections</span>
            </a>
            <a class="btn" data-template="my-collection:register-search-href">
              <span data-i18n="register_search">Register Search</span>
            </a>
          </div>
        </div>
      </div>
    </aside>

  </div>
</div>
