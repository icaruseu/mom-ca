<div class="charter-item" data-template="charter-preview-collection:load">

  <!-- Charter link -->
  <div class="charter-idno" data-template="charter-preview-collection:charter-link-div">
    <!-- Standard collection charter -->
    <div data-template="charter-preview-collection:standard-link">
      <b>
        <span data-i18n="charter">Charter</span>
        <span>: </span>
      </b>
      <span>
        <a data-template="charter-preview-collection:charter-href">
          <span data-template="charter-preview-collection:idno"/>
        </a>
      </span>
    </div>
    <!-- Linked fond charter (sequential number) -->
    <div data-template="charter-preview-collection:linked-fond-link">
      <b>
        <span data-i18n="sequential-number">Sequential number</span>
        <span>: </span>
      </b>
      <span>
        <a data-template="charter-preview-collection:charter-href">
          <span data-template="charter-preview-collection:sequential-number"/>
        </a>
      </span>
    </div>
  </div>

  <!-- Date -->
  <div class="charter-date" data-template="charter-preview:date"/>

  <!-- Abstract -->
  <div class="charter-abstract" data-template="charter-preview:abstract"/>

  <!-- Charter meta -->
  <div class="charter-meta">
    <!-- Image count -->
    <div data-template="charter-preview:num-images"/>

    <!-- View charter link -->
    <div>
      <a data-template="charter-preview-collection:charter-href" class="btn">
        <span data-i18n="view-charter">View Charter</span>
      </a>
      <br/>
      <a data-template="charter-preview-collection:pdf-href" target="blank" class="btn">
        <span data-i18n="pdf-export">PDF- Export</span>
      </a>
      <!-- Charter versions (moderator only) -->
      <div data-template="charter-preview-collection:versions-link">
        <a data-template="charter-preview-collection:versions-href" class="btn">
          <span data-i18n="charter-versions">Charter versions</span>
        </a>
      </div>
    </div>

    <!-- MyArchive functions (authenticated) -->
    <div data-template="auth:require-group" data-group="atom">
      <div>
        <span class="text-small" data-i18n="my-archive">MyArchive</span><br/>

        <!-- Bookmark trigger -->
        <div data-template="charter-preview-collection:bookmark-trigger"/>

        <!-- Bookmark note -->
        <div data-template="charter-preview-collection:bookmark-note"/>

        <!-- Publication user actions (save/edit/release/remove/publish) -->
        <div data-template="charter-preview-collection:publication-actions"/>
      </div>
    </div>

    <!-- Not authenticated: greyed-out actions -->
    <div data-template="auth:require-group-else" data-group="atom">
      <div class="text-muted" data-template="charter-preview-collection:bookmark-placeholder">
        <span data-i18n="add-bookmark">Add bookmark</span>
      </div>
      <div class="text-muted" data-template="charter-preview-collection:edit-placeholder">
        <span data-i18n="edit-charter">Edit charter</span>
      </div>
    </div>

    <!-- Original context (for linked charters from archival fonds) -->
    <div data-template="charter-preview-collection:original-context">
      <b>
        <span data-i18n="original-context">Original context</span>
        <span>: </span>
      </b>
      <a data-template="charter-preview-collection:archive-link"/>
      <span class="sep"> &gt; </span>
      <a data-template="charter-preview-collection:fond-link"/>
      <span class="sep"> &gt; </span>
      <a data-template="charter-preview-collection:original-charter-link"/>
    </div>
  </div>
</div>
