<!--
    MOM-CA Image Tools Page
    =======================
    Converted from: my/XRX/src/mom/app/crop/widget/image-tools.widget.xml

    Fullscreen image annotation/cropping tool. Uses XForms models for
    bookmark and publication. Heavy jQuery/Jcrop/pixastic integration
    for image manipulation (crop, zoom, brightness, contrast, rotate).
-->
<div id="image-tools-page">

    <fx-fore>
        <fx-model id="mbookmark">
            <fx-instance>
                <data>
                    <xrx:bookmark xmlns:xrx="http://www.monasterium.net/NS/xrx"></xrx:bookmark>
                </data>
            </fx-instance>
        </fx-model>

        <div id="pushDiv">
            <img id="pushImg" src="resources/images/arrow_down.png" alt="toggle"/>
        </div>

        <div id="functionField">
            <!-- Function field populated by image-tools JavaScript -->
        </div>

        <div id="image-container" data-template="image-tools:viewer">
            <!-- Image viewer and annotation canvas rendered here -->
        </div>

    </fx-fore>

</div>

<style>
    html { overflow-y: hidden; overflow-x: hidden; }
    body { background-color: white; height: 100%; margin: 0; overflow-y: hidden; overflow-x: hidden; padding: 0; }
    #pushDiv { position: absolute; background: white; bottom: 0px; z-index: 24; width: 100px; height: 20px; border: solid #52a0ec 1px; border-bottom-width: 0px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
    #pushImg { position: relative; left: 38px; height: 25px; }
    #functionField { position: fixed; background: white; bottom: -40px; z-index: 3; width: 1100px; height: 0px; border: solid #52a0ec 1px; border-bottom-width: 0px; border-top-left-radius: 8px; border-top-right-radius: 8px; }
</style>
