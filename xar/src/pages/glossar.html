<div class="page-layout">

    <main>
        <div class="card">
            <div class="card-header">
                <h1>Glossar</h1>
                <p class="text-muted">Illuminierte Urkunden</p>
            </div>
            <div class="card-body">
                <div class="entry"></div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="card">
            <div class="card-body">
                <img src="resources/images/illum.jpg" alt="IlluminatedCharters"/>
                <img src="resources/images/mom-logo.png" alt="mom"/>
            </div>
        </div>
    </aside>

</div>

<script type="text/javascript">
(function($, undefined) {
    var dieurl = window.location.href;
    var parameter = dieurl.indexOf('pm=') + 3;
    var gesamt = dieurl.length;
    var pm = dieurl.substring(parameter, gesamt);
    $.ajax({
        url: "service/getGlossar",
        type: "GET",
        dataType: "html",
        data: { pm: pm },
        success: function(data, textStatus, jqXHR) {
            $('div.entry').append(data);
            return true;
        },
        error: function() {
            console.log("failed");
            return false;
        }
    });
})(jQuery);
</script>
