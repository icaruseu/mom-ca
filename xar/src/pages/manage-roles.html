<!--
    MOM-CA Manage Roles Page
    =========================
    Conversion of the legacy manage-roles.widget.xml.
    This page lists all configured roles and links to apply-role for each.

    No XForms in the original (xformsflag=false in MOM override,
    xformsflag=true but no xf:model in core). Uses data-template
    placeholders for the dynamic XQuery role listing.

    Requires authentication with role=user-administrator.

    Sources:
        my/XRX/src/core/app/auth/widget/manage-roles.widget.xml
        my/XRX/src/mom/app/auth/widget/manage-roles.widget.xml
-->
<div id="dmanage-roles">

    <h2 data-i18n="manage-roles">Manage roles</h2>

    <!-- Unauthenticated / unauthorized state -->
    <div id="manage-roles-guest" class="auth-false" hidden="hidden">
        <p data-i18n="protected-page-message">
            Protected page. Please login first.
        </p>
    </div>

    <!-- Authorized state (user-administrator) -->
    <div id="manage-roles-list" class="auth-true">

        <!-- Role list: populated dynamically by XQuery template module.
             Each role entry is rendered as a block with a link to apply-role. -->
        <div data-template="auth:list-roles">
            <!--
                Template generates one block per configured role:

                <div class="drole">
                    <div class="dinner-role">
                        <h3>{role-name}</h3>
                        <div>
                            <a href="apply-role/{role-key}">
                                <span data-i18n="apply-role">apply role</span>
                                <span>&nbsp;&gt;&gt;</span>
                            </a>
                        </div>
                    </div>
                </div>
            -->
        </div>

    </div>

</div>

<style>
    #dmanage-roles {
        position: relative;
        float: left;
        width: 800px;
    }

    #dmanage-roles .drole {
        position: relative;
        float: left;
        width: 100%;
        background: rgb(220, 220, 220);
        border-bottom: solid white 3px;
    }

    #dmanage-roles .dinner-role {
        position: relative;
        float: left;
        margin: 10px;
    }
</style>

<script type="module">
    // Toggle authorized / unauthorized views
    const isAdmin = document.documentElement.dataset.role?.includes('user-administrator');
    if (!isAdmin) {
        const list = document.getElementById('manage-roles-list');
        const guest = document.getElementById('manage-roles-guest');
        if (list) list.hidden = true;
        if (guest) guest.hidden = false;
    }
</script>
