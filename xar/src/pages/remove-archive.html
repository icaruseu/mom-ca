<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="remove-archive">Remove Archive</title>
  </head>
  <body>
    <div>
      <div data-template="archive:back-div"/>

      <div class="card">
        <div class="card-header">
          <h1>
            <span data-i18n="remove-archive">Remove archive</span>
            <span>: <span data-template="archive:remove-heading"/></span>
          </h1>
        </div>
        <div class="card-body">
          <!-- Auth: community or metadata-manager -->
          <div data-template="auth:if-role" data-template-role="metadata-manager,community">
            <div data-template="archive:request-div"/>
            <div data-template="archive:remove-public-entries-div"/>
            <table>
              <thead data-template="archive:table-heading-div"/>
              <tbody>
                <tr data-template="archive:archive-objects-div"/>
                <tr data-template="archive:fond-objects-div"/>
                <tr data-template="archive:charter-objects-div"/>
                <tr data-template="archive:published-charters-div"/>
                <tr data-template="archive:released-charters-div"/>
                <tr data-template="archive:saved-charters-div"/>
                <tr data-template="archive:bookmarks-div"/>
                <tr data-template="archive:imported-charters-div"/>
              </tbody>
            </table>
          </div>

          <!-- Not authorized -->
          <div data-template="auth:if-not-logged-in">
            <span data-template="archive:protected-page-div"/>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
