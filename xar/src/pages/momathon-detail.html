<!--
    MOM-CA MOMathon Detail Page
    ===========================
    Converted from: my/XRX/src/mom/app/momathon/widget/momathon-detail.widget.xml
-->
<div class="page-layout--full" data-template="momathon-detail:page">

    <fx-fore>
        <fx-model id="mbookmark">
            <fx-instance><data><xrx:bookmark xmlns:xrx="http://www.monasterium.net/NS/xrx"></xrx:bookmark><xrx:bookmarkNote xmlns:xrx="http://www.monasterium.net/NS/xrx"></xrx:bookmarkNote></data></fx-instance>
            <fx-submission id="ssave-note" url="service/save-bookmark-note" method="post" replace="none"></fx-submission>
        </fx-model>

        <div class="card">
            <div class="card-header">
                <h2 data-i18n="charters-to-publish">Charters to publish</h2>
            </div>
            <div class="card-body">

                <!-- Pagination -->
                <div data-template="momathon-detail:navigation"></div>

                <!-- MOMathon info header -->
                <div class="card" data-template="momathon-detail:header">
                    <div class="card-body">
                        <h3>MOMathon Details</h3>
                        <p><b>Anzahl beteiligter User: <span data-template="momathon-detail:user-count"></span></b></p>
                        <p><b>Anzahl bearbeitete Urkunden: <span data-template="momathon-detail:charter-count"></span></b></p>
                        <p><b>Noch freizuschaltende Urkunden: <span data-template="momathon-detail:pending-count"></span></b></p>
                    </div>
                </div>

                <!-- Note bubble popup -->
                <div id="noteBobble" hidden>
                    <fx-control ref="bookmarkNote">
                        <label data-i18n="bookmark-note">Bookmark note</label>
                    </fx-control>
                    <div id="note-save-trigger">
                        <fx-trigger>
                            <button class="btn btn--primary" data-i18n="save">save</button>
                        </fx-trigger>
                    </div>
                </div>

                <!-- Charter list -->
                <div class="charter-list" data-template="momathon-detail:charter-list">
                    <!-- Each charter rendered with preview, actions, bookmark/publish controls -->
                </div>

                <!-- Bottom pagination -->
                <div data-template="momathon-detail:navigation"></div>
            </div>
        </div>

    </fx-fore>

</div>
