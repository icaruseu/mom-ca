<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>EAD Import</title>
</head>
<body>
    <div id="dcharter-import" data-template="app:charter-import-view" class="page-layout--full">
        <a data-template="app:charter-import-back-link"><span>&lt;&lt;</span><span data-i18n="back-to-fond">Back to fond</span></a>
        <h2>
            <span data-i18n="ead-import">EAD Import</span>
            <span>: <span data-template="app:charter-import-context-name"></span></span>
        </h2>
        <div data-template="app:charter-import-breadcrumb" data-template-type="ead"></div>
        <div data-template="app:auth-check" data-template-role="metadata-manager">
            <fx-fore>
                <fx-model id="mimport">
                    <fx-instance>
                        <data>
                            <cacheid data-template="app:charter-import-cacheid"></cacheid>
                            <processid></processid>
                            <fileuri></fileuri>
                            <context data-template="app:charter-import-context"></context>
                            <archid data-template="app:charter-import-archid"></archid>
                            <fondid data-template="app:charter-import-fondid"></fondid>
                            <collectionid data-template="app:charter-import-collectionid"></collectionid>
                            <schemaid>momEAD</schemaid>
                            <xsltid>momEAD2cei</xsltid>
                            <type>EAD</type>
                        </data>
                    </fx-instance>
                    <fx-instance id="ivalidation-response"><data><status></status><namespace></namespace><message></message><icon></icon></data></fx-instance>
                    <fx-instance id="itransform-response"><data><status></status><namespace></namespace><message></message><icon></icon></data></fx-instance>
                    <fx-instance id="iimport-response"><data><status></status><message></message><icon></icon></data></fx-instance>
                    <fx-submission id="svalidate" url="service/xml-validate" method="post" replace="instance" instance="ivalidation-response"></fx-submission>
                    <fx-submission id="stransform" url="service/xml-transform" method="post" replace="instance" instance="itransform-response"></fx-submission>
                    <fx-submission id="simport" url="service/xml-import" method="post" replace="instance" instance="iimport-response"></fx-submission>
                </fx-model>

                <!-- Step 1: Upload -->
                <div class="card" id="cupload">
                    <div class="card-header">
                        <h3><span>1. </span><span data-i18n="select-file">Select a file</span> <span class="text-muted text-small">(<span data-i18n="step">Step</span> 1 <span data-i18n="of">of</span> 4)</span></h3>
                    </div>
                    <div class="card-body">
                        <div class="form-group">
                            <fx-control ref="fileuri" type="file"><label></label></fx-control>
                        </div>
                        <div class="previous-next-trigger">
                            <fx-trigger><button class="btn btn--primary" data-i18n="next">next</button></fx-trigger>
                        </div>
                    </div>
                </div>

                <!-- Step 2: Validate -->
                <div class="card" id="cvalidate">
                    <div class="card-header">
                        <h3><span>2. </span><span data-i18n="validate">Validate</span> <span class="text-muted text-small">(<span data-i18n="step">Step</span> 2 <span data-i18n="of">of</span> 4)</span></h3>
                    </div>
                    <div class="card-body">
                        <fx-trigger><button class="btn btn--primary"><span data-i18n="validate-now">Validate now</span>!</button><fx-send submission="svalidate"></fx-send></fx-trigger>
                        <div class="previous-next-trigger">
                            <fx-trigger><button class="btn" data-i18n="previous">previous</button></fx-trigger>
                            <fx-trigger><button class="btn" data-i18n="cancel">Cancel</button></fx-trigger>
                            <fx-trigger><button class="btn btn--primary" data-i18n="next">next</button></fx-trigger>
                        </div>
                        <div class="report">
                            <table class="reporttable">
                                <tr><td><span data-i18n="status">Status</span>: </td><td><fx-control ref="instance('ivalidation-response')//status"><label></label></fx-control></td></tr>
                                <tr><td><span data-i18n="namespace">Namespace</span>: </td><td><fx-control ref="instance('ivalidation-response')//namespace"><label></label></fx-control></td></tr>
                                <tr><td><span data-i18n="message">Message</span>: </td><td><fx-control ref="instance('ivalidation-response')//message"><label></label></fx-control></td></tr>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Simulate -->
                <div class="card" id="csimulate">
                    <div class="card-header">
                        <h3><span>3. </span><span data-i18n="simulate-charter-import">Simulate charter import</span> <span class="text-muted text-small">(<span data-i18n="step">Step</span> 3 <span data-i18n="of">of</span> 4)</span></h3>
                    </div>
                    <div class="card-body">
                        <fx-trigger><button class="btn btn--primary"><span data-i18n="simulate-now">Simulate now</span>!</button><fx-send submission="stransform"></fx-send></fx-trigger>
                        <div class="previous-next-trigger">
                            <fx-trigger><button class="btn" data-i18n="previous">previous</button></fx-trigger>
                            <fx-trigger><button class="btn" data-i18n="cancel">Cancel</button></fx-trigger>
                            <fx-trigger><button class="btn btn--primary" data-i18n="next">next</button></fx-trigger>
                        </div>
                        <div class="report">
                            <table class="reporttable">
                                <tr><td><span data-i18n="status">Status</span>: </td><td><fx-control ref="instance('itransform-response')//status"><label></label></fx-control></td></tr>
                                <tr><td><span data-i18n="namespace">Namespace</span>: </td><td><fx-control ref="instance('itransform-response')//namespace"><label></label></fx-control></td></tr>
                                <tr><td><span data-i18n="message">Message</span>: </td><td><fx-control ref="instance('itransform-response')//message"><label></label></fx-control></td></tr>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Step 4: Import -->
                <div class="card" id="cimport">
                    <div class="card-header">
                        <h3><span>4. </span><span data-i18n="import">Import</span> <span class="text-muted text-small">(<span data-i18n="step">Step</span> 4 <span data-i18n="of">of</span> 4)</span></h3>
                    </div>
                    <div class="card-body">
                        <fx-trigger><button class="btn btn--primary"><span data-i18n="import-now">Import now</span>!</button><fx-send submission="simport"></fx-send></fx-trigger>
                        <fieldset>
                            <legend><span data-i18n="status">Status</span></legend>
                            <div id="progressbar-import"><div class="progress-label">0%</div></div>
                        </fieldset>
                        <div>
                            <fx-control ref="instance('iimport-response')//message"><label></label></fx-control>
                        </div>
                        <div class="previous-next-trigger">
                            <fx-trigger><button class="btn" data-i18n="previous">previous</button></fx-trigger>
                            <fx-trigger><button class="btn" data-i18n="cancel">Cancel</button></fx-trigger>
                        </div>
                        <div id="dpreview-link">
                            <a class="btn btn--primary" data-template="app:charter-import-preview-link"><span data-i18n="preview">Preview</span></a>
                        </div>
                    </div>
                </div>

                <div data-template="app:include" data-template-path="useful-links-ead.html"></div>
            </fx-fore>
        </div>
        <div data-template="app:auth-fallback"><span data-i18n="protected-page-message">Protected page. Please login first.</span></div>
    </div>
</body>
</html>
