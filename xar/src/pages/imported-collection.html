<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="imported-collection">Imported collection</title>
</head>
<body>
  <div data-template="imported-collection:load">

    <!-- Breadcrumb -->
    <div id="breadcrumb">
      <a data-template="config:resolve-link" href="collections">
        <span data-i18n="collections">Collections</span>
      </a>
      <span> &gt; </span>
      <a data-template="imported-collection:parent-link">
        <span data-template="imported-collection:collection-id"/>
      </a>
      <span> &gt; </span>
      <a href="imported-collection">
        <span data-i18n="imported-collection-preview">Imported collection (preview)</span>
      </a>
    </div>

    <!-- Heading -->
    <div class="h2">
      <span data-i18n="imported-collection-preview">Imported collection (preview)</span>
      <span>: </span>
      <span data-template="imported-collection:context-name"/>
    </div>

    <!-- My Functions (authenticated) -->
    <div data-template="auth:require-group" data-group="atom">
      <div class="my-functions">
        <h3 data-i18n="my-functions">MyFunctions</h3>
        <!-- Metadata manager functions -->
        <div data-template="auth:require-role" data-role="metadata-manager">
          <div class="function-links">
            <div class="function-link">
              <a data-template="imported-collection:edit-info-href">
                <span>&#8227; </span>
                <span data-i18n="edit-collection-info">Edit collection Information</span>
              </a>
            </div>
            <div class="function-link">
              <a data-template="imported-collection:import-charters-href">
                <span>&#8227; </span>
                <span data-i18n="import-charters">Import Charters</span>
                <span> (Excel, CEI, EAD, XML, OAI, SQL)</span>
              </a>
            </div>
            <div class="function-link" data-template="imported-collection:publish-trigger">
              <span data-i18n="publish-charters">Publish charters</span>
            </div>
            <div class="function-link" data-template="imported-collection:remove-trigger">
              <span data-i18n="remove-imported-charters">Remove imported charters</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Charter previews -->
    <div id="dcharter-preview-main">
      <div data-template="imported-collection:charter-preview-items"/>
      <div data-template="charters:block-navigation"/>
    </div>

  </div>
</body>
</html>
