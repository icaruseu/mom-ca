<!--
    MOM-CA MOMathon Page
    ====================
    Converted from: my/XRX/src/mom/app/momathon/widget/momathon.widget.xml

    Main MOMathon landing page. Auth-protected (atom group).
    Shows upcoming MOMathon event info, editable htdoc content sections
    (home, date, all, google), and list of recent MOMathons.
    Uses XForms models for bookmark and publication.
-->
<div data-template="auth:require-group" data-group="atom">

    <fx-fore>
        <fx-model id="mbookmark">
            <fx-instance><data></data></fx-instance>
        </fx-model>

        <div id="dcharter-preview-main">
            <div class="h2">
                <a name="top"></a>
                <span data-i18n="momathon">MOMathon</span>
            </div>

            <div class="inner-charter-preview">
                <!-- Event status -->
                <div>
                    <h2 data-template="momathon:event-status">
                        <span data-i18n="momathon-event">MOMathon Event on </span>
                    </h2>
                </div>

                <!-- Content sections (mode-dependent, rendered by server) -->
                <div data-template="momathon:content-section">
                    <!-- Htdoc content rendered here based on mode parameter -->
                </div>

                <!-- Edit links for html-authors -->
                <div data-template="auth:require-role" data-role="html-author">
                    <a class="edit-link" data-template="momathon:edit-link">
                        <span>[</span><span data-i18n="edit">Edit</span><span>]</span>
                    </a>
                </div>

                <hr/>
            </div>

            <!-- Recent MOMathons list -->
            <div id="recent-momathons">
                <h2 data-i18n="recent-momathons">List of recent MOMathons:</h2>
                <ul data-template="momathon:recent-list">
                    <!-- Server renders <li> items for each recent MOMathon -->
                </ul>
            </div>

            <a style="float:right;" href="#top">&raquo;Top</a>
        </div>

    </fx-fore>

</div>

<div data-template="auth:fallback">
    <h3 data-i18n="protected-page-message">Protected page. Please login first.</h3>
</div>

<style>
    #dcharter-preview-main { position: relative; float: left; width: 800px; }
    #dcharter-preview-main .charter * { line-height: 1.6em; }
    #dcharter-preview-main .charter { position: relative; width: 100%; float: left; background: rgb(245,245,245); }
    #dcharter-preview-main .charter-preview { position: relative; float: left; width: 100%; background: rgb(245,245,245); border-bottom: solid white 5px; }
    #dcharter-preview-main .inner-charter-preview { position: relative; float: left; width: 100%; margin: 15px; }
    #dcharter-preview-main .charter-info-and-actions { display: inline; position: relative; float: left; width: 25%; border-left: solid white 3px; padding-left: 10px; }
    #dcharter-preview-main .container { float: left; width: 65%; padding-right: 10px; }
    #dcharter-preview-main .charter-info-and-actions * { font-size: 13px; }
    #dcharter-preview-main .fieldset { border: solid #C8C8C8 1px; margin-top: 10px; }
    #dcharter-preview-main .inner-fieldset { margin: 5px; }
    img.displayed { display: block; margin-left: auto; margin-right: auto; }
</style>
