<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="released-charters">Released Charters</title>
  </head>
  <body>
    <div data-template="publication:released-charters-view">

      <div class="card">
        <div class="card-header">
          <h1 data-i18n="released-charters">Released Charters</h1>
        </div>
        <div class="card-body">
          <div data-template="publication:navigation"/>

          <p>These charters will soon be published by your moderator <b data-template="publication:moderator-name"/>.</p>

          <div class="charter-list">
            <div data-template="publication:released-charter-list" class="charter-item">
              <!-- Context info -->
              <div data-template="publication:charter-context-info"/>
              <div>
                <b><span data-i18n="charter">Charter</span><span>: </span></b>
                <span data-template="publication:charter-idno"/>
              </div>
              <div>
                <b><span data-i18n="date">Date</span><span>: </span></b>
                <span data-template="publication:charter-date"/>
              </div>
              <div>
                <b><span data-i18n="abstract">Abstract</span><span>: </span></b>
                <span data-template="publication:charter-abstract"/>
              </div>
              <div class="text-small text-muted">
                <span><span data-i18n="images">Images</span><span>: </span></span>
                <span data-template="publication:image-count"/>
              </div>
              <div class="text-small text-muted">
                <span><span data-i18n="transcription">Transcription</span><span>: </span></span>
                <span data-template="publication:has-transcription"/>
              </div>
            </div>
          </div>

          <div data-template="publication:navigation"/>
        </div>
      </div>
    </div>
  </body>
</html>
