<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Charter Preview</title>
</head>
<body>
  <div data-template="charter-preview-my-collection:load" class="charter-preview">

    <!-- Charter link -->
    <div>
      <b>
        <span data-i18n="my-charter-preview">My Charter (Preview)</span>
        <span>: </span>
      </b>
      <span>
        <a data-template="charter-preview-my-collection:charter-href">
          <span data-template="charter-preview-my-collection:idno"/>
        </a>
      </span>
    </div>

    <!-- Date -->
    <div data-template="charter-preview:date"/>

    <!-- Abstract -->
    <div data-template="charter-preview:abstract"/>

    <!-- Image count -->
    <div data-template="charter-preview:num-images"/>

    <!-- View charter link -->
    <div>
      <a data-template="charter-preview-my-collection:charter-href">
        <span data-i18n="view-charter">View charter</span>
      </a>
    </div>

    <!-- Edit charter link -->
    <div>
      <a data-template="charter-preview-my-collection:edit-href" target="_blank">
        <span data-i18n="edit-charter">Edit charter</span>
      </a>
    </div>

  </div>
</body>
</html>
