<div class="charter-item" data-template="charter-preview-my-collection:load">

  <!-- Charter link -->
  <div class="charter-idno">
    <b>
      <span data-i18n="my-charter-preview">My Charter (Preview)</span>
      <span>: </span>
    </b>
    <span>
      <a data-template="charter-preview-my-collection:charter-href">
        <span data-template="charter-preview-my-collection:idno"/>
      </a>
    </span>
  </div>

  <!-- Date -->
  <div class="charter-date" data-template="charter-preview:date"/>

  <!-- Abstract -->
  <div class="charter-abstract" data-template="charter-preview:abstract"/>

  <!-- Charter meta -->
  <div class="charter-meta">
    <!-- Image count -->
    <div data-template="charter-preview:num-images"/>

    <!-- View charter link -->
    <div>
      <a data-template="charter-preview-my-collection:charter-href" class="btn">
        <span data-i18n="view-charter">View charter</span>
      </a>
    </div>

    <!-- Edit charter link -->
    <div>
      <a data-template="charter-preview-my-collection:edit-href" target="_blank" class="btn btn--primary">
        <span data-i18n="edit-charter">Edit charter</span>
      </a>
    </div>
  </div>
</div>
