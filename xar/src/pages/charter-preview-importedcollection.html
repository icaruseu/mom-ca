<div class="charter-item" data-template="charter-preview-importedcollection:load">

  <!-- Charter link -->
  <div class="charter-idno">
    <b>
      <span data-i18n="imported-charter-preview">Imported Charter (Preview)</span>
      <span>: </span>
    </b>
    <span>
      <a data-template="charter-preview-importedcollection:charter-href">
        <span data-template="charter-preview-importedcollection:idno"/>
      </a>
    </span>
  </div>

  <!-- Date -->
  <div class="charter-date" data-template="charter-preview:date"/>

  <!-- Abstract -->
  <div class="charter-abstract" data-template="charter-preview:abstract"/>

  <!-- Charter meta -->
  <div class="charter-meta">
    <!-- Image count -->
    <div data-template="charter-preview:num-images"/>

    <!-- View charter link -->
    <div>
      <a data-template="charter-preview-importedcollection:charter-href" class="btn">
        <span data-i18n="view-charter">View Charter</span>
      </a>
    </div>
  </div>
</div>
