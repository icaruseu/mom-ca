<!--
    MOM-CA Apply Role Page (Fore Web Components)
    ==============================================
    Conversion of the legacy apply-role.widget.xml from XForms to Fore
    web components.

    Requires authentication with role=user-administrator.

    Mapping applied:
        xf:model       -> fx-fore > fx-model
        xf:instance    -> fx-instance
        xf:bind        -> fx-bind
        xf:submission  -> fx-submission
        xf:repeat      -> fx-repeat
        xf:select1     -> fx-control wrapping <select>
        xf:trigger     -> fx-trigger wrapping <button>

    Sources:
        my/XRX/src/core/app/auth/widget/apply-role.widget.xml
        my/XRX/src/mom/app/auth/widget/apply-role.widget.xml
-->
<div id="apply-role-page">

    <div>
        <a href="manage-roles">
            <span>&lt;&lt;&nbsp;</span>
            <span data-i18n="back">back</span>
        </a>
    </div>

    <h2 data-i18n="apply-role">Apply role</h2>

    <!-- Unauthenticated / unauthorized state -->
    <div id="apply-role-guest" class="auth-false" hidden="hidden">
        <p data-i18n="protected-page-message">
            Protected page. Please login first.
        </p>
    </div>

    <!-- Authorized state (user-administrator) -->
    <div id="dform" class="auth-true">
        <div id="dinnerform">

            <h2 data-template="auth:role-name-label">
                <!-- Populated dynamically: "Role Name (role-key)" -->
            </h2>

            <fx-fore>
                <fx-model id="mapply-role">

                    <fx-instance id="imembers" src="/api/auth/role-members">
                        <data>
                            <roleid></roleid>
                            <!-- member elements populated dynamically -->
                        </data>
                    </fx-instance>

                    <fx-instance id="itemplate">
                        <data>
                            <member></member>
                        </data>
                    </fx-instance>

                    <fx-instance id="iresponse">
                        <data></data>
                    </fx-instance>

                    <fx-instance id="iusers" src="/api/user/list">
                        <data>
                            <!-- user elements populated dynamically -->
                        </data>
                    </fx-instance>

                    <fx-bind ref="instance('imembers')//member"></fx-bind>
                    <fx-bind ref="instance('itemplate')//member"></fx-bind>
                    <fx-bind ref="instance('iusers')//user"></fx-bind>

                    <fx-submission id="ssave"
                                   url="/api/auth/apply-role"
                                   method="POST"
                                   replace="instance"
                                   instance="iresponse">
                    </fx-submission>

                </fx-model>

                <!-- Repeat: one row per member -->
                <fx-repeat ref="instance('imembers')//member" id="rmembers">
                    <template>
                        <div class="member-row">
                            <fx-control ref="." class="member-select">
                                <select>
                                    <fx-items ref="instance('iusers')//user">
                                        <template>
                                            <option value="{email}">{label}</option>
                                        </template>
                                    </fx-items>
                                </select>
                            </fx-control>
                            <fx-trigger class="btn-remove-member">
                                <button>-</button>
                                <fx-delete ref="." event="click"></fx-delete>
                            </fx-trigger>
                        </div>
                    </template>
                </fx-repeat>

                <!-- Add member -->
                <fx-trigger>
                    <button data-i18n="add-member">Add member</button>
                    <fx-insert ref="instance('imembers')//member"
                               origin="instance('itemplate')//member"
                               at="last()"
                               position="after"
                               event="click">
                    </fx-insert>
                </fx-trigger>

                <br/>
                <br/>

                <!-- Save -->
                <div id="dsave">
                    <fx-trigger>
                        <button data-i18n="save">Save</button>
                        <fx-send submission="ssave" event="click"></fx-send>
                    </fx-trigger>
                </div>

                <fx-message event="submit-done" level="ephemeral">OK</fx-message>
                <fx-message event="submit-error" level="ephemeral">Error</fx-message>

            </fx-fore>

        </div>
    </div>

</div>

<style>
    #dform {
        position: relative;
        float: left;
        width: 600px;
        margin-left: 185px;
        margin-top: 50px;
        background: rgb(240, 240, 240);
    }

    #dinnerform {
        margin: 20px;
    }

    #dsave {
        position: relative;
        float: left;
        width: 100%;
        text-align: right;
    }

    .member-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.25rem;
    }

    .member-select select {
        min-width: 350px;
    }

    .btn-remove-member button {
        cursor: pointer;
    }
</style>

<script type="module">
    // Toggle authorized / unauthorized views
    const isAdmin = document.documentElement.dataset.role?.includes('user-administrator');
    if (!isAdmin) {
        const form = document.getElementById('dform');
        const guest = document.getElementById('apply-role-guest');
        if (form) form.hidden = true;
        if (guest) guest.hidden = false;
    }
</script>
