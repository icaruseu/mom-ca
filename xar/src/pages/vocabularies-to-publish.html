<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="vocabularies-to-publish">Vocabularies to publish</title>
  </head>
  <body>
    <div data-template="publication:vocabularies-to-publish-view">

      <div class="card">
        <div class="card-header">
          <h1 data-i18n="vocabularies-to-publish">Vocabularies to publish</h1>
        </div>
        <div class="card-body">
          <div data-template="publication:navigation"/>

          <div class="charter-list">
            <div data-template="publication:vocabulary-to-publish-list" class="charter-item">
              <div>
                <b data-i18n="vocab-released">A modified version of a vocabulary has been released.</b>
              </div>
              <div>
                <span data-i18n="vocabulary">Vocabulary</span>
                <span>: <span data-template="publication:vocabulary-name"/></span>
              </div>
              <div class="text-small text-muted">
                <span data-i18n="edited-by">Edited by</span>
                <span>: <span data-template="publication:edited-by"/></span>
              </div>
              <div class="text-small text-muted">
                <span data-i18n="released-at">Released</span>
                <span>: <span data-template="publication:released-date"/></span>
              </div>
              <div>
                <a data-template="publication:version-diff-link" data-i18n="version-difference">Version Difference</a>
              </div>
              <div data-template="publication:bookmark-trigger"/>
              <div data-template="publication:user-actions"/>
            </div>
          </div>

          <div data-template="publication:navigation"/>
        </div>
      </div>
    </div>
  </body>
</html>
