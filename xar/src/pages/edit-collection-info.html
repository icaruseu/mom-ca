<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="edit-collection-info">Edit Collection Info</title>
  <style>
    #edit-collection-info .icon img {
      width: 32px;
    }
    #edit-collection-info textarea {
      width: 650px;
    }
    #edit-collection-info {
      width: 700px;
    }
    #preface-div .xfValue {
      width: 630px;
    }
  </style>
</head>
<body>
  <div class="standard-form InlineRoundBordersAlert" id="edit-collection-info">

    <div>
      <a data-template="edit-collection-info:back-link">
        <span>&lt; </span>
        <span data-i18n="back-to-collection">Back to collection</span>
      </a>

      <div class="h2">
        <span data-i18n="edit-collection-info">Edit Collection Info</span>
      </div>
      <br/><br/>

      <!-- Fore form for editing collection info -->
      <fx-fore>
        <fx-model id="mcollection-info">
          <fx-instance id="icollection-info" data-template="edit-collection-info:instance"/>
          <fx-submission id="ssave"
                         url="edit-collection-info:save-url"
                         data-template="edit-collection-info:submission"
                         method="POST"
                         replace="none"/>
          <fx-bind ref="//cei:provenance/text()" id="bcollectionname"/>
          <fx-bind ref="//cei:provenance/@pid" id="bcollectionid" readonly="true"/>
          <fx-bind ref="//cei:image_server_address" id="bimage-server-address"/>
          <fx-bind ref="//cei:image_server_folder" id="bimage-server-folder"/>
          <fx-bind ref="//cei:div[@type='preface']" id="bpreface" required="false"/>
        </fx-model>

        <!-- Collection name -->
        <fx-control ref="//cei:provenance/text()">
          <label>
            <span data-i18n="collection-name">Collection Name</span><span>: </span>
          </label>
          <fx-hint>
            <span data-i18n="eg">e.g.</span><span> Serbische Herrscherurkunden (1306-1388)</span>
          </fx-hint>
          <fx-alert>
            <span data-i18n="required-field">Required field</span><span>.</span>
          </fx-alert>
        </fx-control>

        <!-- Collection ID (readonly) -->
        <fx-control ref="//cei:provenance/@pid">
          <label>
            <span data-i18n="collection-id">Collection ID</span><span>: </span>
          </label>
          <fx-hint>
            <span data-i18n="eg">e.g.</span><span> BISANU</span>
          </fx-hint>
          <fx-alert>
            <span data-i18n="only-upper-and-lower-case">Only upper and lower case characters</span><span>.</span>
          </fx-alert>
        </fx-control>

        <!-- Image server -->
        <fx-control ref="//cei:image_server_address">
          <label>
            <span data-i18n="image-server-address">Image server</span><span>: </span>
          </label>
          <fx-hint>
            <span data-i18n="eg">e.g.</span><span> www.monasterium.net</span>
          </fx-hint>
        </fx-control>

        <!-- Image server folder -->
        <fx-control ref="//cei:image_server_folder">
          <label>
            <span data-i18n="image-server-folder">Folder</span><span>: </span>
          </label>
          <fx-hint>
            <span data-i18n="eg">e.g.</span><span> pics/BISANU</span>
          </fx-hint>
        </fx-control>

        <!-- Save button -->
        <div style="text-align:right">
          <h2>
            <fx-trigger>
              <button><span data-i18n="save">Save</span></button>
              <fx-send submission="ssave"/>
            </fx-trigger>
          </h2>
        </div>

        <!-- Preface textarea -->
        <div>
          <fx-control ref="//cei:div[@type='preface']" id="preface-div" type="textarea">
            <label>
              <span data-i18n="preface">Preface</span><span>:</span>
            </label>
          </fx-control>
        </div>
      </fx-fore>

    </div>
  </div>
</body>
</html>
