<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="saved-charters">Saved Charters</title>
  </head>
  <body>
    <div data-template="publication:saved-charters-view">

      <div class="card">
        <div class="card-header">
          <h1 data-i18n="saved-charters">Saved Charters</h1>
        </div>
        <div class="card-body">
          <div data-template="publication:navigation"/>

          <div class="charter-list">
            <div data-template="publication:saved-charter-list" class="charter-item">
              <!-- Context info (fond or collection) -->
              <div data-template="publication:charter-context-info"/>
              <div>
                <b><span data-i18n="charter">Charter</span><span>: </span></b>
                <span data-template="publication:charter-idno"/>
              </div>
              <div>
                <b><span data-i18n="date">Date</span><span>: </span></b>
                <span data-template="publication:charter-date"/>
              </div>

              <!-- Published version -->
              <div>
                <b><span data-i18n="actual-live-version">Current live version</span><span>: </span></b>
                <span data-template="publication:charter-abstract"/>
              </div>
              <div>
                <a data-template="publication:view-charter-link" data-i18n="view-charter">View Charter</a>
              </div>

              <!-- Saved version -->
              <div>
                <b><span data-i18n="my-local-copy">My local copy</span><span>: </span></b>
                <span data-template="publication:saved-charter-abstract"/>
              </div>
              <div>
                <a data-template="publication:view-saved-charter-link" data-i18n="view-charter">View Charter</a>
              </div>
              <div>
                <a data-template="publication:version-diff-link" data-i18n="version-difference">Version Difference</a>
              </div>
              <div data-template="publication:bookmark-trigger"/>
              <div data-template="publication:bookmark-note"/>
              <div data-template="publication:user-actions"/>
            </div>
          </div>

          <div data-template="publication:navigation"/>
        </div>
      </div>
    </div>
  </body>
</html>
