<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Year Navigation</title>
</head>
<body>
    <aside id="year-navi" class="sidebar">
        <div class="card">
            <div class="card-header">
                <h4 data-i18n="Years">Years</h4>
            </div>
            <div class="card-body">
                <ul class="nostyle" data-template="app:year-navi-blocks">
                    <li>
                        <a data-template="app:year-navi-block-link">
                            <span data-template="app:year-navi-block-label"></span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </aside>
</body>
</html>
