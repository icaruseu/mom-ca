<div id="dmy-collections">

  <nav class="breadcrumb">
    <a data-template="config:resolve-link" href="collections">
      <span data-i18n="collections">Collections</span>
    </a>
    <span class="sep">/</span>
    <a data-template="config:resolve-link" href="my-collections">
      <span data-i18n="my-collections-preview">MyCollections (Preview)</span>
    </a>
  </nav>

  <h1 data-i18n="my-collections-preview">MyCollections (Preview)</h1>

  <div class="page-layout">

    <main>
      <!-- Authenticated content -->
      <div data-template="auth:require-group" data-group="atom">
        <div class="card">
          <div class="card-header" data-i18n="owned-by-me">Owned by me</div>
          <div class="card-body">
            <ul class="nostyle" data-template="my-collections:owned-list"/>
          </div>
        </div>

        <div class="card">
          <div class="card-header" data-i18n="shared-with-me">Shared with me</div>
          <div class="card-body">
            <!-- Shared collections rendered by template -->
          </div>
        </div>
      </div>

      <!-- Not authenticated fallback -->
      <div data-template="auth:require-group-else" data-group="atom">
        <div class="card">
          <div class="card-body">
            <p class="text-muted" data-i18n="protected-page-message">Protected page. Please login first.</p>
            <div data-template="login:form"/>
          </div>
        </div>
      </div>
    </main>

    <aside class="sidebar">
      <div class="card">
        <div class="card-header" data-i18n="my-functions">Actions</div>
        <div class="card-body">
          <a class="btn" data-template="config:resolve-link" href="my-collections-edit">
            <span data-i18n="edit-my-collections">Edit my Collections</span>
          </a>
          <a class="btn" data-template="config:resolve-link" href="collections">
            <span data-i18n="collections">Collections</span>
          </a>
        </div>
      </div>
    </aside>

  </div>
</div>
