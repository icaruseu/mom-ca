<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title data-i18n="my-collections">My Collections</title>
  <style>
    #dmy-collections .heading {
      position: relative;
      float: left;
      margin-top: 20px;
      margin-bottom: 10px;
      width: 100%;
    }
    #dmy-collections .heading * {
      font-size: 1.2em;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="dmy-collections">

    <div class="h2">
      <span data-i18n="my-collections-preview">MyCollections (Preview)</span>
    </div>

    <!-- Breadcrumb -->
    <div id="breadcrumb">
      <a data-template="config:resolve-link" href="collections">
        <span data-i18n="collections">Collections</span>
      </a>
      <span> &gt; </span>
      <a data-template="config:resolve-link" href="my-collections">
        <span data-i18n="my-collections-preview">MyCollections (Preview)</span>
      </a>
    </div>

    <!-- Authenticated content -->
    <div data-template="auth:require-group" data-group="atom">
      <div class="heading">
        <span><span data-i18n="owned-by-me">Owned by me</span>:</span>
      </div>
      <ul class="nostyle" data-template="my-collections:owned-list"/>
      <div class="heading">
        <span><span data-i18n="shared-with-me">Shared with me</span>:</span>
      </div>
    </div>

    <!-- Not authenticated fallback -->
    <div data-template="auth:require-group-else" data-group="atom">
      <span data-i18n="protected-page-message">Protected page. Please login first.</span>
      <div data-template="login:form"/>
    </div>

  </div>
</body>
</html>
