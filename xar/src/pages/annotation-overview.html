<!--
    MOM-CA Annotation Overview Page
    ===============================
    Converted from: my/XRX/src/mom/app/annotation/widget/annotation-overview.widget.xml
-->
<div class="page-layout--full" data-template="annotation:overview-page">

    <script type="text/javascript">
        $(document).ready(function() {
            jQuery(document).annoOverview({
                requestRoot: "",
                widget: "annoOverview",
                collection: "",
                scope: "public"
            });
            jQuery(document).i18nText({
                lang: "",
                requestRoot: ""
            });
        });
    </script>

    <div>
        <a href="collection">
            <span>&lt;&lt; </span>
            <span data-i18n="back">back</span>
        </a>
    </div>

    <div class="card">
        <div class="card-header">
            <h2 data-i18n="annotations">Annotations</h2>
        </div>
        <div class="card-body">
            <div>
                <span id="loading" hidden>
                    <img src="resources/images/ajax-loader.gif" alt="loading"/>
                </span>
                <span id="no-annos" hidden>
                    <span data-i18n="no-annos-in-collection">There are no annotations available for this collection!</span>
                </span>
            </div>

            <div id="scrollBox"></div>

            <div id="select-arrows">
                <img class="r-arrow" id="arrow-selector-left" title="Previous"
                     src="resources/images/arrow_l_roundabout.png"/>
                <img class="r-arrow" id="arrow-selector-right" title="Next"
                     src="resources/images/arrow_r_roundabout.png"/>
            </div>

            <table id="data-table">
                <tr>
                    <td><strong><span data-i18n="charter">Charter</span>:</strong></td>
                    <td><a href="#" id="charter-data"></a></td>
                </tr>
                <tr>
                    <td><strong><span data-i18n="related-to">Related to</span>:</strong></td>
                    <td id="related-to-data"></td>
                </tr>
                <tr>
                    <td><strong><span data-i18n="content">Content</span>:</strong></td>
                    <td id="content-data"></td>
                </tr>
                <tr>
                    <td><strong><span data-i18n="additional-description">Additional Description</span>:</strong></td>
                    <td id="desc-data"></td>
                </tr>
            </table>
            <span id="data-broken" hidden>
                <span data-i18n="broken-anno">The annotation you selected is not linked to a markup element!</span>
            </span>
        </div>
    </div>

</div>
