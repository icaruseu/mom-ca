<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title data-i18n="my-users">My users</title>
</head>
<body>
    <div>
        <div class="h2">
            <span data-i18n="my-users">My Users</span>
        </div>
        <ol data-template="app:list-my-users">
            <li class="user-info-div">
                <div>
                    <b data-template="app:user-fullname"></b>
                </div>
                <table>
                    <tr>
                        <td><span data-i18n="email">Email</span><span>:</span></td>
                        <td data-template="app:user-email"></td>
                    </tr>
                    <tr>
                        <td><span data-i18n="phone">Phone</span><span>:</span></td>
                        <td data-template="app:user-phone"></td>
                    </tr>
                    <tr>
                        <td><span data-i18n="institution">Institution</span><span>:</span></td>
                        <td data-template="app:user-institution"></td>
                    </tr>
                    <tr>
                        <td><span data-i18n="street">Street</span><span>:</span></td>
                        <td data-template="app:user-street"></td>
                    </tr>
                    <tr>
                        <td><span data-i18n="zip">ZIP</span><span>:</span></td>
                        <td data-template="app:user-zip"></td>
                    </tr>
                    <tr>
                        <td><span data-i18n="city">City</span><span>:</span></td>
                        <td data-template="app:user-town"></td>
                    </tr>
                </table>
            </li>
        </ol>
    </div>
</body>
</html>
