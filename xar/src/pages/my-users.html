<div class="page-layout--full">
    <div class="card">
        <div class="card-header">
            <h2 data-i18n="my-users">My Users</h2>
        </div>
        <div class="card-body">
            <table>
                <thead>
                    <tr>
                        <th data-i18n="name">Name</th>
                        <th data-i18n="email">Email</th>
                        <th data-i18n="phone">Phone</th>
                        <th data-i18n="institution">Institution</th>
                        <th data-i18n="street">Street</th>
                        <th data-i18n="zip">ZIP</th>
                        <th data-i18n="city">City</th>
                    </tr>
                </thead>
                <tbody data-template="app:list-my-users">
                    <tr>
                        <td><b data-template="app:user-fullname"></b></td>
                        <td data-template="app:user-email"></td>
                        <td data-template="app:user-phone"></td>
                        <td data-template="app:user-institution"></td>
                        <td data-template="app:user-street"></td>
                        <td data-template="app:user-zip"></td>
                        <td data-template="app:user-town"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
