<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Block Navigation</title>
</head>
<body>
    <nav id="block-navi" class="pagination" data-template="app:block-navi-view">
        <a data-template="app:block-navi-previous-link">
            <span>&lt; </span>
            <span data-i18n="previous">previous</span>
        </a>
        <span data-i18n="charters">Charters</span>
        <span data-template="app:block-navi-current-range"></span>
        <a data-template="app:block-navi-next-link">
            <span data-i18n="next">next</span>
            <span> &gt;</span>
        </a>
    </nav>
</body>
</html>
