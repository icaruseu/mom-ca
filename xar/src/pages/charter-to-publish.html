<div id="charter-to-publish"
     class="page-layout--full"
     data-template="charter-to-publish:init"
     data-template-atom-id="$wcharter:atom-id"
     data-template-context="$wcharter:context"
     data-template-charter="$wcharter:charter">
  <!--
    This widget has no divs of its own (xrx:divs is empty).
    It overrides variables from the parent charter widget to point
    to saved charters for the publish workflow.
    The actual rendering is done by the inherited charter widget structure.
  -->
  <div class="card">
    <div class="card-body" data-template="charter-to-publish:content">
      <!-- Content rendered by inheriting charter widget divs -->
    </div>
  </div>
</div>

<script src="../js/charter.js"></script>
