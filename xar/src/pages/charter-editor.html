<div data-template="charter-editor:init"
     data-template-atom-id="$charter:ratomid">

  <!-- Fore-based editor replacing xrxe:editor -->
  <fx-fore>
    <fx-model id="charter-editor-model">
      <fx-instance id="charter-instance"
                   data-template-src="charter-editor:instance-url"
                   data-template-atom-id="$atom-id">
        <!-- Charter atom:entry loaded here -->
      </fx-instance>

      <fx-submission id="save-charter"
                     data-template-url="charter-editor:save-url"
                     data-template-atom-url="$atom-url"
                     method="post"
                     replace="none">
      </fx-submission>
    </fx-model>

    <!-- Editor UI with tabs -->
    <div id="charter-editor-ui"
         data-template="charter-editor:ui"
         data-template-atom-id="$atom-id"
         data-template-save-url="$atom-url"
         data-template-save-close-url="saved-charters"
         data-template-services-url="xrxe-services.xql"
         data-template-xsd="charter-editor:xsd-path">

      <!-- Tab buttons as .btn group -->
      <div class="btn-group">
        <button class="btn" data-tab="abstract" data-i18n="abstract">abstract</button>
        <button class="btn" data-tab="fulltext" data-i18n="fulltext">fulltext</button>
        <button class="btn" data-tab="source" data-i18n="source">source</button>
        <button class="btn" data-tab="description-of-original" data-i18n="decription-of-original">decription of original</button>
        <button class="btn" data-tab="copies" data-i18n="copies">copies</button>
        <button class="btn" data-tab="commentary" data-i18n="commantary">commantary</button>
        <button class="btn" data-tab="appendix" data-i18n="appendix">appendix</button>
      </div>

      <!-- Tab: Abstract -->
      <div class="card editor-tab" data-tab="abstract">
        <div class="card-body editor-tab-case">
          <div id="abstract-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:abstract"
               data-template-atom-id="$atom-id"
               data-template-node="cei:abstract"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
          <div id="issued-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:issued"
               data-template-atom-id="$atom-id"
               data-template-node="cei:issued"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
        </div>
      </div>

      <!-- Tab: Fulltext -->
      <div class="card editor-tab" data-tab="fulltext">
        <div class="card-body editor-tab-case">
          <div id="tenor-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:tenor"
               data-template-atom-id="$atom-id"
               data-template-node="cei:tenor"
               data-template-context-path="/cei:text/cei:body">
          </div>
        </div>
      </div>

      <!-- Tab: Source -->
      <div class="card editor-tab" data-tab="source">
        <div class="card-body editor-tab-case">
          <div id="front-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:front"
               data-template-atom-id="$atom-id"
               data-template-node="cei:front"
               data-template-context-path="/cei:text">
          </div>
        </div>
      </div>

      <!-- Tab: Description of Original -->
      <div class="card editor-tab" data-tab="description-of-original">
        <div class="card-body editor-tab-case">
          <div id="witnessOrig-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:witnessOrig"
               data-template-atom-id="$atom-id"
               data-template-node="cei:witnessOrig"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
        </div>
      </div>

      <!-- Tab: Copies -->
      <div class="card editor-tab" data-tab="copies">
        <div class="card-body editor-tab-case">
          <div id="witListPar-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:witListPar"
               data-template-atom-id="$atom-id"
               data-template-node="cei:witListPar"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
        </div>
      </div>

      <!-- Tab: Commentary -->
      <div class="card editor-tab" data-tab="commentary">
        <div class="card-body editor-tab-case">
          <div id="diplomaticAnalysis-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:diplomaticAnalysis"
               data-template-atom-id="$atom-id"
               data-template-node="cei:diplomaticAnalysis"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
          <div id="lang_MOM-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:body/cei:chDesc/cei:lang_MOM"
               data-template-atom-id="$atom-id"
               data-template-node="cei:lang_MOM"
               data-template-context-path="/cei:text/cei:body/cei:chDesc">
          </div>
        </div>
      </div>

      <!-- Tab: Appendix -->
      <div class="card editor-tab" data-tab="appendix">
        <div class="card-body editor-tab-case">
          <div id="back-node-editor"
               data-template="charter-editor:node-editor"
               data-template-node-path="/cei:back"
               data-template-atom-id="$atom-id"
               data-template-node="cei:back"
               data-template-context-path="/cei:text">
          </div>
        </div>
      </div>
    </div>
  </fx-fore>
</div>

<script src="../js/charter.js"></script>
