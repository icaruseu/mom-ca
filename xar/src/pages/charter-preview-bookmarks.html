<!--
    MOM-CA Charter Preview (Bookmarks context)
    ===========================================
    Converted from: my/XRX/src/mom/app/bookmark/widget/charter-preview-bookmarks.widget.xml

    This is a subwidget/component used within the bookmarks page. It
    inherits from charter-preview and adds bookmark-specific actions
    (remove bookmark, notes). Uses XForms for bookmark/publication models.
-->
<div class="charter-item" data-template="charter-preview:bookmarks">

  <!-- Charter link: fond or collection context -->
  <div class="charter-idno" data-template="charter-preview:charter-link">
    <a data-template="charter-preview:archive-link"></a>
    <span> - </span>
    <a data-template="charter-preview:fond-link"></a>
    <span class="text-muted">
      <span> (<span data-i18n="fond">Fond</span>)</span>
    </span>
  </div>

  <div class="charter-idno">
    <b><span data-i18n="charter">Charter</span><span>: </span></b>
    <span><a data-template="charter-preview:charter-url"></a></span>
  </div>

  <!-- View charter link -->
  <div class="charter-meta">
    <a data-template="charter-preview:charter-url" class="btn">
      <span data-i18n="view-charter">View Charter</span>
    </a>
  </div>

  <!-- Archive functions (auth-protected) -->
  <div data-template="auth:require-group" data-group="atom">
    <div class="charter-meta">
      <div>
        <span class="text-small" data-i18n="my-archive">MyArchive</span>

        <div>
          <fx-trigger class="btn">
            <button data-i18n="remove-bookmark">Remove bookmark</button>
          </fx-trigger>
        </div>

        <!-- Publication user actions placeholder -->
        <div data-template="publication:user-actions"></div>

        <!-- Bookmark note section -->
        <div>
          <div>
            <b><span data-i18n="bookmark-note">Bookmark note</span><span>: </span></b>
            <br/>
            <span data-template="bookmark:note-output"></span>
            <div>
              <button class="btn" data-i18n="edit-note">Edit note</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Note bubble popup -->
      <div style="display:none;">
        <fx-control ref="bookmarkNote" label-i18n="bookmark-note">
          <label data-i18n="bookmark-note">Bookmark note</label>
        </fx-control>
        <div>
          <fx-trigger>
            <button class="btn btn--primary" data-i18n="save">save</button>
          </fx-trigger>
        </div>
      </div>
    </div>
  </div>

  <!-- Not logged in fallback -->
  <div data-template="auth:fallback" class="text-muted">
    <span data-i18n="add-bookmark">Add bookmark</span>
  </div>
</div>
