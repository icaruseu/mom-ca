<!--
    MOM-CA Login Page
    Uses plain HTML form + fetch() to POST to /api/auth/login
-->
<div style="max-width:400px;margin:2rem auto">
    <div class="card">
        <div class="card-header">
            <h2 style="margin:0">Login</h2>
        </div>
        <div class="card-body">
            <div id="login-message" style="display:none; padding:8px 12px; border-radius:4px; margin-bottom:var(--space-md);"></div>

            <form id="login-form" onsubmit="return false;">
                <div style="margin-bottom: var(--space-md);">
                    <label for="username" style="display:block; margin-bottom:4px; font-weight:600;">Email</label>
                    <input id="username" name="username" type="text" placeholder="you@example.com"
                           autocomplete="username"
                           style="width:100%; padding:8px 12px; border:1px solid var(--color-border); border-radius:4px;" />
                </div>
                <div style="margin-bottom: var(--space-md);">
                    <label for="password" style="display:block; margin-bottom:4px; font-weight:600;">Password</label>
                    <input id="password" name="password" type="password" placeholder="Password"
                           autocomplete="current-password"
                           style="width:100%; padding:8px 12px; border:1px solid var(--color-border); border-radius:4px;" />
                </div>
                <button type="submit" class="btn btn--primary" style="width:100%; justify-content:center;">Login</button>
            </form>

            <p class="text-small" style="margin-top: var(--space-md);">
                <a href="request-password">Forgot your password?</a>
            </p>
        </div>
    </div>
</div>

<script>
document.getElementById('login-form').addEventListener('submit', function() {
    var msg = document.getElementById('login-message');
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;
    if (!username || !password) {
        msg.style.display = 'block';
        msg.style.background = '#fce4e4';
        msg.style.color = '#8b2500';
        msg.textContent = 'Please enter email and password.';
        return;
    }
    msg.style.display = 'block';
    msg.style.background = '#e8f0fe';
    msg.style.color = '#333';
    msg.textContent = 'Logging in...';

    fetch('/mom/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
    .then(function(res) {
        if (res.ok) {
            msg.style.background = '#e6f4ea';
            msg.style.color = '#1a7431';
            msg.textContent = 'Login successful. Redirecting...';
            setTimeout(function() { window.location.href = '/mom/home'; }, 500);
        } else {
            msg.style.background = '#fce4e4';
            msg.style.color = '#8b2500';
            msg.textContent = res.data.message || 'Login failed.';
        }
    })
    .catch(function() {
        msg.style.background = '#fce4e4';
        msg.style.color = '#8b2500';
        msg.textContent = 'Connection error. Please try again.';
    });
});
</script>
