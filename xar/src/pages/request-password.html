<!--
    MOM-CA Request Password Page (Fore Web Components)
    ====================================================
    Conversion of the legacy request-password.widget.xml from XForms
    to Fore web components.

    Sources:
        my/XRX/src/core/app/user/widget/request-password.widget.xml
        my/XRX/src/mom/app/user/widget/request-password.widget.xml
-->
<div id="drequest-password">

    <div class="InlineRoundBordersAlert standard-form">

        <fx-fore>
            <fx-model id="mnew-password">

                <fx-instance id="ipassword">
                    <data>
                        <email></email>
                        <email-repeat></email-repeat>
                    </data>
                </fx-instance>

                <fx-instance id="iresponse">
                    <data>
                        <status></status>
                        <message></message>
                        <icon></icon>
                    </data>
                </fx-instance>

                <fx-bind ref="email" required="true()" type="email"></fx-bind>
                <fx-bind ref="email-repeat" required="true()" type="email" constraint=". = ../email"></fx-bind>

                <fx-submission id="sreset-password"
                               url="/api/user/request-password"
                               method="POST"
                               replace="instance"
                               instance="iresponse">
                </fx-submission>

            </fx-model>

            <h2 data-i18n="request-password">Request for a new Password</h2>

            <!-- Response messages -->
            <div id="dresponse-info-div">
                <div>
                    <fx-output ref="instance('iresponse')/icon" media-type="image/*"></fx-output>
                </div>
                <div>
                    <fx-output ref="instance('iresponse')/message"></fx-output>
                </div>
            </div>
            <br/>

            <div class="vertical-table">

                <!-- Email -->
                <fx-control ref="email" class="form-field">
                    <label slot="label">
                        <span data-i18n="your-email">Your Email Address</span><span>:</span>
                    </label>
                    <input type="email"
                           placeholder="Enter your Email Address"
                           data-i18n-placeholder="enter-your-email"/>
                    <fx-alert data-i18n="email-isnt-valid">Email Address isn't valid.</fx-alert>
                </fx-control>

                <!-- Repeat email -->
                <fx-control ref="email-repeat" class="form-field">
                    <label slot="label">
                        <span data-i18n="repeat">Repeat</span><span>:</span>
                    </label>
                    <input type="email"/>
                    <fx-alert data-i18n="email-does-not-match">Email does not match.</fx-alert>
                </fx-control>

                <!-- Submit -->
                <fx-trigger>
                    <button data-i18n="send">Send</button>
                    <fx-send submission="sreset-password" event="click"></fx-send>
                </fx-trigger>

            </div>

        </fx-fore>

    </div>

</div>

<style>
    #drequest-password {
        max-width: 600px;
    }

    #drequest-password .form-field {
        margin-bottom: 0.75rem;
    }

    #drequest-password .vertical-table {
        display: flex;
        flex-direction: column;
    }
</style>
