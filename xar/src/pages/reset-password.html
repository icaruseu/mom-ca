<!--
    MOM-CA Reset Password Page
    ===========================
    Conversion of the legacy reset-password.widget.xml.
    This is a simple static page with no XForms elements.
    Displayed after a password reset has been completed successfully.

    Sources:
        my/XRX/src/core/app/user/widget/reset-password.widget.xml
        my/XRX/src/mom/app/user/widget/reset-password.widget.xml
-->
<div class="page-layout--full" style="max-width:480px;margin:2rem auto">

    <div class="card text-center">
        <div class="card-header">
            <h2 class="mb-0" data-i18n="reset-password">Reset password</h2>
        </div>
        <div class="card-body">
            <p data-i18n="password-successfully-reseted-message">
                Your Password was successfully reseted. You can login now.
                We recommend to change this password immediately.
            </p>
            <a href="login" class="btn btn--primary">Login</a>
        </div>
    </div>

</div>
