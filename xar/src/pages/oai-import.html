<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>OAI Import</title>
</head>
<body>
    <div id="dcharter-import" data-template="app:charter-import-view" class="page-layout--full">
        <a data-template="app:charter-import-back-link"><span>&lt;&lt;</span><span data-i18n="back-to-fond">Back to fond</span></a>
        <h2>
            <span data-i18n="oai-import">OAI Import</span>
            <span>: <span data-template="app:charter-import-context-name"></span></span>
        </h2>
        <div data-template="app:charter-import-breadcrumb" data-template-type="oai"></div>
        <div class="card">
            <div class="card-body">
                <p class="text-muted">The OAI import wizard will be available soon.</p>
            </div>
        </div>
    </div>
</body>
</html>
