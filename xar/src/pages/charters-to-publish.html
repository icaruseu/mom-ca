<html xmlns="http://www.w3.org/1999/xhtml"
      data-template="templates:surround" data-template-with="templates/page.html" data-template-at="content">
  <head>
    <title data-i18n="charters-to-publish">Charters to publish</title>
  </head>
  <body>
    <div data-template="publication:charters-to-publish-view">

      <div class="card">
        <div class="card-header">
          <h1 data-i18n="charters-to-publish">Charters to publish</h1>
        </div>
        <div class="card-body">
          <div data-template="publication:navigation"/>

          <div class="charter-list">
            <div data-template="publication:charter-to-publish-list" class="charter-item">
              <!-- Context info -->
              <div data-template="publication:charter-context-info"/>
              <div>
                <b><span data-i18n="charter">Charter</span><span>: </span></b>
                <span data-template="publication:charter-idno"/>
              </div>
              <div>
                <b><span data-i18n="date">Date</span><span>: </span></b>
                <span data-template="publication:charter-date"/>
              </div>
              <div>
                <b><span data-i18n="abstract">Abstract</span><span>: </span></b>
                <span data-template="publication:charter-abstract"/>
              </div>
              <div class="text-small text-muted">
                <span data-i18n="edited-by">Edited by</span>
                <span>: <span data-template="publication:edited-by"/></span>
              </div>
              <div class="text-small text-muted">
                <span data-i18n="released-at">Released</span>
                <span>: <span data-template="publication:released-date"/></span>
              </div>
              <div>
                <a data-template="publication:view-editions-link" data-i18n="view-editions">View Editions</a>
              </div>
              <div>
                <a data-template="publication:version-diff-link" data-i18n="version-difference">Version Difference</a>
              </div>
              <div data-template="publication:bookmark-trigger"/>
              <div data-template="publication:user-actions"/>
            </div>
          </div>

          <div data-template="publication:navigation"/>
        </div>
      </div>
    </div>
  </body>
</html>
