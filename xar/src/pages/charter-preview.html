<div id="dcharter-preview-main"
     data-template="charter-preview:init"
     data-template-charter="$constructor:charter"
     data-template-all-user-xmls="$constructor:all-user-xmls"
     data-template-charter-context="$constructor:charter-context"
     data-template-illurkimages="$illurkimages">

  <!-- Standard charter preview (when no illurkimages) -->
  <div class="charter-list" data-template-if="no-illurkimages">
    <div class="charter-item">
      <div data-template-id="charter-preview:anchor-id"></div>

      <!-- Charter link -->
      <div class="charter-idno">
        <b>
          <span data-i18n="charter">Charter</span>
          <span>: </span>
        </b>
        <a data-template-href="$wcharter-preview:charter-url">
          <span data-template="charter-preview:idno"></span>
        </a>
      </div>

      <!-- Date -->
      <div class="charter-date">
        <b>
          <span data-i18n="date">Date</span>
          <span>: </span>
        </b>
        <span data-template="charter-preview:date"></span>
      </div>

      <!-- Abstract -->
      <div class="charter-abstract">
        <b>
          <span data-i18n="abstract">Abstract</span>
          <span>: </span>
        </b>
        <span data-template="charter-preview:abstract"></span>
      </div>

      <!-- Original context (from inherited divs) -->
      <div data-template="charter-preview:original-context"></div>

      <!-- Charter meta / actions -->
      <div class="charter-meta">
        <!-- Images count -->
        <div>
          <span class="text-small">
            <span data-i18n="images">Images</span>
            <span>: </span>
          </span>
          <span data-template="charter-preview:num-images"></span>
        </div>

        <!-- Transcription status -->
        <div>
          <span class="text-small">
            <span data-i18n="transcription">Transcription</span>
            <span>: </span>
          </span>
          <span data-template="charter-preview:has-transcription">
            <span data-i18n="yes">yes</span>
          </span>
        </div>

        <!-- View charter link -->
        <div>
          <a data-template-href="$wcharter-preview:charter-url" class="btn">
            <span data-i18n="view-charter">View Charter</span>
          </a>
          <br/>
          <a data-template-href="charter-preview:pdf-export-url" target="blank" class="btn">
            <span data-i18n="pdf-export">PDF- Export</span>
          </a>
          <!-- Charter versions link (moderator only) -->
          <div data-template-if="is-moderator">
            <a data-template-href="charter-preview:versions-url" class="btn">
              <span data-i18n="charter-versions">Charter versions</span>
            </a>
          </div>
        </div>

        <!-- MyArchive functions (auth-gated) -->
        <div data-template="charter-preview:my-archive-functions"
             data-template-atom-id="$wcharter-preview:atom-id"
             data-template-is-bookmarked="$wcharter-preview:is-bookmarked"
             data-template-is-moderator="$wcharter-preview:is-moderator">

          <!-- Authenticated -->
          <div data-template-if="logged-in">
            <span class="text-small">
              <span data-i18n="my-archive">MyArchive</span>
            </span><br/>

            <!-- Bookmark trigger -->
            <div data-template="bookmark:trigger">
              <span data-i18n="add-bookmark">Add bookmark</span>
            </div>

            <!-- Bookmark note -->
            <div data-template-id="charter-preview:note-field-id"
                 style="display:none">
              <div>
                <b>
                  <span data-i18n="bookmark-note">Bookmark note</span>
                  <span>: </span>
                </b>
                <br/>
                <span data-template-id="charter-preview:note-output-id"></span>
                <div>
                  <fx-trigger data-template-id="charter-preview:note-edit-id" appearance="minimal">
                    <fx-label>
                      <span data-i18n="create-note">Create note</span>
                    </fx-label>
                  </fx-trigger>
                </div>
              </div>
            </div>

            <!-- Note bubble -->
            <div data-template-id="charter-preview:note-bobble-id" style="display:none">
              <div>
                <fx-fore>
                  <fx-model id="mbookmark">
                    <!-- Bookmark model -->
                  </fx-model>
                  <fx-control data-template-id="charter-preview:note-textarea-id"
                              ref="//xrx:bookmarkNote" type="textarea">
                    <fx-label>
                      <span data-i18n="bookmark-note">Bookmark note</span>:
                    </fx-label>
                  </fx-control>
                  <div>
                    <fx-trigger>
                      <fx-label>
                        <span data-i18n="save">save</span>
                      </fx-label>
                    </fx-trigger>
                  </div>
                </fx-fore>
              </div>
            </div>

            <!-- Publication actions -->
            <div data-template="publication:user-actions"
                 data-template-atom-id="$wcharter-preview:atom-id"
                 data-template-is-moderator="$wcharter-preview:is-moderator">
              <span data-i18n="save-and-edit-charter">Save and edit charter</span>
            </div>
          </div>

          <!-- Not authenticated -->
          <div data-template-if="not-logged-in">
            <div class="text-muted">
              <span data-i18n="add-bookmark">Add bookmark</span>
            </div>
            <div class="text-muted">
              <span data-i18n="edit-charter">Edit charter</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Illuminated images variant (when illurkimages is set) -->
  <div data-template-if="has-illurkimages">
    <div class="charter-item">
      <div class="charter-idno">
        <b>
          <span data-i18n="charter">Charter</span>
          <span>: </span>
        </b>
        <a data-template-href="charter-preview:charter-url-illurk">
          <span data-template="charter-preview:idno"></span>
        </a>
      </div>
      <div class="charter-date">
        <b>
          <span data-i18n="date">Date</span>
          <span>: </span>
        </b>
        <span data-template="charter-preview:date"></span>
      </div>
      <div class="charter-abstract">
        <b>
          <span data-i18n="abstract">Abstract</span>
          <span>: </span>
        </b>
        <span data-template="charter-preview:short-abstract"></span>
      </div>
      <div class="charter-meta">
        <a data-template-href="charter-preview:charter-url-illurk" class="btn">
          <span data-i18n="view-charter">View Charter</span>
        </a>
        <br/>
        <a data-template-href="charter-preview:pdf-export-url" target="blank" class="btn">
          <span data-i18n="pdf-export">PDF- Export</span>
        </a>
      </div>
      <div data-template="charter-preview:illurk-images"
           data-template-charter="$constructor:charter"
           data-template-atom-id="$wcharter-preview:atom-id"
           data-template-charter-context="$constructor:charter-context">
        <span class="text-small">
          <span data-i18n="images">Images</span>
          <span>: </span>
          <span data-template="charter-preview:num-images"></span>
        </span>
        <!-- Thumbnail images rendered dynamically -->
      </div>
    </div>
  </div>
</div>

<script src="../js/charter.js"></script>
