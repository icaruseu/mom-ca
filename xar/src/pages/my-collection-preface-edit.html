<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Preface</title>
  <style>
    #dmy-collection-body {
      font-family: Courier, monospace;
      position: relative;
      float: left;
      width: 100%;
      background: rgb(230, 230, 230);
    }
    #dmy-collection-inner-preface {
      margin: 3%;
    }
    #dpreface {
      position: relative;
      float: left;
      width: 68%;
      margin: 1%;
      background: white;
    }
    #dedit-my-collection-context {
      position: relative;
      float: left;
      width: 26%;
      margin: 1%;
      padding: 1%;
      background: white;
    }
    .p {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div data-template="my-collection-preface-edit:load">

    <div id="forms-message"></div>

    <!-- Header -->
    <div id="dmy-collection-header">
      <h2>Edit Preface</h2>
      <div id="autoSaveStatus"></div>
    </div>

    <!-- Toolbar -->
    <div id="dmy-collection-toolbar">
      <div id="dmy-collection-inner-toolbar">
        <div id="forms-mixedcontent-elements"></div>
        <div id="forms-mixedcontent-tagname"></div>
      </div>
    </div>

    <!-- Authenticated body -->
    <div data-template="auth:require-group" data-group="atom">
      <div id="dmy-collection-body">

        <!-- XML instance (hidden) -->
        <div class="xrx-forms-instance" id="forms-console" style="display:none"
             data-template="my-collection-preface-edit:instance"/>

        <div id="dpreface">
          <div id="dmy-collection-inner-preface">
            <div class="p">
              <div>Title Statement</div>
              <textarea class="forms-mixedcontent" name="textarea1"
                        data-ref="/atom:entry/atom:content/cei:cei/cei:teiHeader/cei:fileDesc/cei:titleStmt"/>
            </div>
            <div class="p">
              <div>Publication Statement</div>
              <textarea class="forms-mixedcontent" name="textarea2"
                        data-ref="/atom:entry/atom:content/cei:cei/cei:teiHeader/cei:fileDesc/cei:publicationStmt"/>
            </div>
            <div class="p">
              <div>Preface</div>
              <textarea class="forms-mixedcontent" name="textarea3"
                        data-ref="/atom:entry/atom:content/cei:cei/cei:text/cei:front"/>
            </div>
          </div>
        </div>

        <div id="dedit-my-collection-context">
          <div id="forms-mixedcontent-attributes"></div>
        </div>

        <!-- Hidden data stores -->
        <div class="xrx-forms-i18n-catalog" style="display:none"
             data-template="my-collection-preface-edit:i18n-catalog"/>
        <div class="xrx-forms-json-attribute-suggestions" style="display:none"
             data-template="my-collection-preface-edit:attribute-suggestions"/>
        <div class="xrx-forms-json-element-suggestions" style="display:none"
             data-template="my-collection-preface-edit:element-suggestions"/>
        <div class="xrx-forms-json-topics" style="display:none"
             data-template="my-collection-preface-edit:topics"/>
      </div>
    </div>

    <!-- Not authenticated -->
    <div data-template="auth:require-group-else" data-group="atom" id="dlogin">
      <span data-i18n="protected-page-message">Protected page. Please login first.</span>
      <div data-template="login:form"/>
    </div>

  </div>
</body>
</html>
