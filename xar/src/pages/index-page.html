<!--
    MOM-CA Index Page
    =================
    Converted from: my/XRX/src/mom/app/index/widget/index.widget.xml
-->
<div class="page-layout" data-template="index:page">

    <main>
        <!-- Breadcrumb -->
        <div data-template="index:breadcrumb">
            <span class="text-muted" data-template="index:breadcrumb-label"></span>
        </div>

        <!-- SKOS editor link (auth-protected) -->
        <div data-template="auth:require-group" data-group="atom">
            <div data-template="index:skos-editor-link"></div>
        </div>

        <div class="card">
            <div class="card-body">
                <!-- Hits / search results -->
                <div data-template="index:results">
                    <div class="charter-list" data-template="index:hit-entry">
                        <!-- Individual hit entries rendered here -->
                    </div>
                </div>

                <!-- Block navigation -->
                <div data-template="index:block-navi"></div>

                <!-- Charter preview area -->
                <div class="charter-list" data-template="index:charter-previews"></div>

                <!-- Glossary entry area -->
                <div data-template="index:glossary-entry"></div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <!-- Alphabet navigation -->
        <div data-template="index:alphabet-nav"></div>

        <!-- Index use text -->
        <div data-template="index:use-text"></div>
    </aside>

</div>
