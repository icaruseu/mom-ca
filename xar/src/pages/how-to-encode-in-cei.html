<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>How to encode in CEI</title>
</head>
<body>
    <div class="page-layout--full">
        <h2 data-i18n="how-to-enocde-in-cei">How-to encode charters in CEI</h2>

        <div id="dhow-to-encode-in-cei">
            <div class="card">
                <div class="card-header">
                    <h3 data-i18n="cei_idno">signature</h3>
                </div>
                <div class="card-body">
                    <table>
                        <tr><th colspan="3"><span data-i18n="cei_idno">Signature</span></th></tr>
                        <tr>
                            <td><span data-i18n="description">Description</span></td>
                            <td data-template="app:cei-schema-description" data-template-element="idno"></td>
                        </tr>
                        <tr>
                            <td><span data-i18n="example">Example</span></td>
                            <td data-template="app:cei-schema-example" data-template-element="idno"></td>
                        </tr>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 data-i18n="cei_abstract">abstract</h3>
                </div>
                <div class="card-body">
                    <table>
                        <tr><th colspan="3"><span data-i18n="cei_abstract">abstract</span></th></tr>
                        <tr>
                            <td><span data-i18n="description">Description</span></td>
                            <td data-template="app:cei-schema-description" data-template-element="abstract"></td>
                        </tr>
                        <tr>
                            <td><span data-i18n="example">Example</span></td>
                            <td data-template="app:cei-schema-example" data-template-element="abstract"></td>
                        </tr>
                    </table>
                    <table>
                        <tr><th colspan="3"><span data-i18n="cei_date">Date</span></th></tr>
                        <tr>
                            <td><span data-i18n="description">Description</span></td>
                            <td data-template="app:cei-schema-description" data-template-element="date"></td>
                        </tr>
                        <tr>
                            <td><span data-i18n="description">Description</span></td>
                            <td data-template="app:cei-schema-example" data-template-element="date"></td>
                        </tr>
                    </table>
                    <table>
                        <tr><th colspan="3"><span data-i18n="cei_dateRange">date range</span></th></tr>
                    </table>
                    <table>
                        <tr><th colspan="3"><span data-i18n="cei_placeName">Place name</span></th></tr>
                    </table>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <h4 data-i18n="cei_tenor">Fulltext</h4>
                    <h4 data-i18n="cei_sourceDesc">Sources</h4>
                    <h4 data-i18n="cei_witnessOrig">Original</h4>
                    <h4 data-i18n="cei_witListPar">Copies</h4>
                    <h4 data-i18n="cei_diplomaticAnalysis">Commentary</h4>
                    <h4 data-i18n="cei_index">Index</h4>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
