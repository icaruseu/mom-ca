<div id="dcountry" data-template="app:country-view">

  <h1>
    <span data-i18n="country">Country</span>
    <span>: <span data-template="app:country-name"></span> (<span data-template="app:country-id"></span>)</span>
  </h1>

  <div class="card">
    <div class="card-header" data-i18n="regions-and-archives">Regions and Archives</div>
    <div class="card-body">
      <!-- Archives without subdivision -->
      <div data-template="app:archives-without-subdivision"></div>
      <!-- Archives ordered by subdivision -->
      <div data-template="app:archives-by-subdivision"></div>
    </div>
  </div>
</div>
