<!--
    MOM-CA Image Collections Page
    =============================
    Converted from: my/XRX/src/mom/app/crop/widget/image-collections.widget.xml

    Lists public image collections with cropped images. Auth-protected.
    Moderators can edit collection type/name and delete images.
    Users can save collections to their personal collections.
-->
<div data-template="auth:require-group" data-group="atom">
    <div id="basic">
        <div class="h2">
            <span data-i18n="image-collections">Image Collections</span>
        </div>
        <br/><br/>
        <div id="loadtext"></div>
        <div id="annolist">
            <div id="anno" data-template="image-collections:list">
                <!-- Server renders collection entries with their cropped images -->
            </div>
        </div>
    </div>
</div>

<!-- Fallback for unauthenticated users -->
<div data-template="auth:fallback">
    <div class="h2">
        <span data-i18n="image-collections">Image Collections</span>
    </div>
    <span data-i18n="protected-page-message">Protected page. Please login first.</span>
    <div data-template="app:login-form"></div>
</div>

    .entry { position: relative; margin-bottom: 30px; width: 800px; float: none; height: 100%; }
    .entryheader { position: relative; width: 100%; float: left; z-index: 5; margin-top: 30px; height: 33px; border: solid #F0F0F0 3px; border-bottom: 0px; border-top-left-radius: 10px; border-top-right-radius: 10px; }
