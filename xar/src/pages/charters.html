<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Charters</title>
</head>
<body>
    <div id="charters" data-template="app:charters-view" class="page-layout">
        <div>
            <!-- Heading -->
            <div data-template="app:charters-heading"></div>
            <!-- Breadcrumb -->
            <div data-template="app:charters-breadcrumb"></div>
            <!-- My functions -->
            <div data-template="app:charters-my-functions"></div>

            <!-- Block navigation and search -->
            <div id="heading">
                <div id="container">
                    <div data-template="app:charters-block-navi"></div>
                    <div data-template="app:charters-goto-search"></div>
                </div>
            </div>

            <!-- Preface or charter preview -->
            <div data-template="app:charters-content"></div>
        </div>

        <!-- Year navigation sidebar -->
        <aside class="sidebar" id="year-navi">
            <div data-template="app:charters-preface-link"></div>
            <div class="card">
                <div class="card-header">
                    <h4 data-i18n="Years">Years</h4>
                </div>
                <div class="card-body">
                    <ul class="nostyle">
                        <li data-template="app:charters-year-blocks"></li>
                    </ul>
                </div>
            </div>
        </aside>
    </div>

    <!-- Copy legal popup -->
    <div id="copy-legal-popUp" style="display:none">
        <div id="dialogcontent">
            <span data-i18n="you-are-copying-a-text-from">You are copying a text from</span>
            <span id="insertOwner"></span>
            <span data-i18n="end-legal-text">into your own collection. Please be aware that reusing it might infringe intellectual property rights, so please check individual licences and cite the source of your information when you publish your data</span>
        </div>
    </div>
    <div id="select-collection-popUp" style="display:none">
        <div id="dialogcontent">
            <select id="collectionSelect"></select>
        </div>
    </div>
</body>
</html>
