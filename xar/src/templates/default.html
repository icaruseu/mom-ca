<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title data-template="config:app-title">MOM-CA</title>

    <!-- Fore web-component runtime (XForms replacement) -->
    <script type="module" src="resources/fore/fore.js"></script>
    <link rel="stylesheet" href="resources/fore/fore.css"/>

    <!-- Application global styles -->
    <link rel="stylesheet" href="resources/css/mom-ca.css"/>
</head>
<body>

    <!-- ============================================================
         Header: logo area and navigation placeholder
         ============================================================ -->
    <header id="app-header">
        <div class="header-inner">
            <a href="" class="logo" data-template="config:app-root-link">
                <img src="resources/images/mom-logo.png"
                     alt="MOM-CA - Monasterium Collaborative Archive"/>
            </a>
            <nav id="main-nav" data-template="templates:include"
                 data-template-path="templates/nav.html">
                <!-- Navigation will be injected here; static fallback: -->
                <ul>
                    <li><a href="home">Home</a></li>
                    <li><a href="collections">Collections</a></li>
                    <li><a href="search">Search</a></li>
                    <li><a href="login2">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ============================================================
         Main content area: pages are injected here by view.xql
         ============================================================ -->
    <main id="content" data-template="view:render-page">
        <!-- Page content placeholder -->
    </main>

    <!-- ============================================================
         Footer
         ============================================================ -->
    <footer id="app-footer">
        <div class="footer-inner">
            <p>&copy; <span data-template="config:current-year">2026</span>
               <a href="https://www.monasterium.net">Monasterium.net</a> &ndash;
               ICARUS &ndash; International Centre for Archival Research</p>
            <nav class="footer-nav">
                <a href="contact">Contact</a>
                <a href="help">Help</a>
                <a href="terms-of-use">Terms of Use</a>
            </nav>
        </div>
    </footer>

</body>
</html>
