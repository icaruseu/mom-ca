version: "3.8"

services:
  existdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mom-ca-existdb
    ports:
      - "8080:8080"       # eXist-db HTTP (Dashboard, REST, WebDAV)
      - "8443:8443"       # eXist-db HTTPS (optional)
    volumes:
      # Persist database data across restarts
      - existdb-data:/exist/data
      # Mount mom-data seed files (optional, for importing existing data)
      # - ../mom-data:/exist/import-data:ro
    environment:
      EXIST_ENV: development
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2048m
        -Djava.awt.headless=true
        -Dfile.encoding=UTF-8
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/exist/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

volumes:
  existdb-data:
    driver: local
