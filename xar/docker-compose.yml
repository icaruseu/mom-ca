services:
  caddy:
    image: caddy:2-alpine
    container_name: mom-ca-proxy
    ports:
      - "8888:80"          # MOM-CA erreichbar unter http://localhost:8888/mom/
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      existdb:
        condition: service_healthy
    restart: unless-stopped

  existdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mom-ca-existdb
    ports:
      - "8080:8080"
    volumes:
      - existdb-data:/exist/data
      - /Users/stephan/Downloads/full20260310-0400-2:/exist/import-data:ro
    environment:
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2048m
        -Djava.awt.headless=true
        -Dfile.encoding=UTF-8
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/exist/status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  existdb-data:
    driver: local
