services:
  caddy:
    image: caddy:2-alpine
    container_name: mom-ca-proxy
    ports:
      - "8888:80"          # MOM-CA erreichbar unter http://localhost:8888/mom/
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      existdb:
        condition: service_healthy
    restart: unless-stopped

  existdb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mom-ca-existdb
    # Port 8080 nur intern für Caddy erreichbar, NICHT nach außen gemappt
    # Für direkten eXist-db Zugriff: ports section einkommentieren
    # ports:
    #   - "8080:8080"
    expose:
      - "8080"
    volumes:
      - existdb-data:/exist/data
    environment:
      JAVA_OPTS: >-
        -Xms512m
        -Xmx2048m
        -Djava.awt.headless=true
        -Dfile.encoding=UTF-8
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/exist/status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  existdb-data:
    driver: local
